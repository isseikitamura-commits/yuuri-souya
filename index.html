const tn=(f,t,d,v,w)=>{if(!f||_muted)return;v=v||.18;w=w||'square';try{const c=gac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=w;o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d*.9);o.start(t);o.stop(t+d);}catch(e){}};
const N={R:0,C4:262,D4:294,E4:330,F4:349,G4:392,A4:440,B4:494,C5:523,D5:587,E5:659,F5:698,G5:784,A5:880,B5:988,C6:1047,D6:1175,E6:1319,Ab4:415,Bb4:466,Eb5:622,Ab5:831,Bb5:932};

};
const bgm=name=>{if(_bcur===name)return;stopBgm();_bcur=name;_bgmLoop(name);};
const _bgmLoop=n=>{if(_bcur!==n||_muted)return;const b=BGMS[n];if(!b)return;
  try{const c=gac();let t=c.currentTime+.06;const bd=60/b.bpm;
  b.s.forEach(([f,beats])=>{tn(f,t,beats*bd*.88,.18,'square');t+=beats*bd;});
  if(b.loop===false)return;
  _btid=setTimeout(()=>_bgmLoop(n),(t-c.currentTime)*1000-100);}catch(e){}};
const stopBgm=()=>{_bcur=null;if(_btid)clearTimeout(_btid);_btid=null;};
const toggleMute=()=>{_muted=!_muted;if(_muted)stopBgm();return _muted;};

  heal:()=>{if(_muted)return;const c=gac(),t=c.currentTime;[523,659,784].forEach((f,i)=>tn(f,t+i*.09,.28,.22,'sine'));},
  revive:()=>{if(_muted)return;const c=gac(),t=c.currentTime;[392,494,587,740,880,1047].forEach((f,i)=>tn(f,t+i*.1,.4,.24,'sine'));},
  lvup:()=>{if(_muted)return;const c=gac(),t=c.currentTime;const dq=[523,659,784,1047,784,1047,784,1046,1047];dq.forEach((f,i)=>tn(f,t+i*.12,(i<8?.18:.45),(i<8?.22:.35),'triangle'));tn(1319,t+dq.length*.12+.05,.6,.28,'sine');},

  {n:'第1章',title:'旅立ちの朝',emoji:'🌅',bgm:'field',story:'カシミール地方の青年「ゆうり」と「そうや」。\nある朝、隣国ドゴールから使者が駆け込んできた。\n「大変だ！悪魔サタンが現れ\nフィリア姫を攫っていったのです！」\nゆうりとそうやは顔を見合わせた。\n「行こう、そうや。姫様を助けにいくんだ！」\n二人の大冒険が、今始まった——。'},

function MpBar({mp,maxMp}){const pct=Math.max(0,(mp/maxMp)*100);return <div className="mpt"><div className="mpf" style={{width:pct+'%'}}/></div>;}
function ExpBar({exp,level}){
  const prev=level<=1?0:calcNext(level-1),nxt=calcNext(level),pct=Math.min(100,((exp-prev)/(nxt-prev))*100);
  return(<div><div style={{display:'flex',justifyContent:'space-between',fontSize:'.62rem',color:'#5555e8',marginBottom:'2px'}}><span>EXP</span><span>次まで{nxt-exp}</span></div><div className="expt"><div className="expf" style={{width:pct+'%'}}/></div></div>);
}

const initHuman=(classId,name)=>{const c=CLASSES[classId];return{isMonster:false,classId,name,hp:c.hp,maxHp:c.hp,mp:c.mp,maxMp:c.mp,atk:c.atk,def:c.def,mat:c.mat,exp:0,level:1,status:null,statusTurns:0,defending:false,reflecting:false,atkBuffMult:1,atkBuffTurns:0,defBuffMult:1,defBuffTurns:0,learnedSpells:[]};};
const initMonsterAlly=tpl=>({isMonster:true,id:tpl.id,name:tpl.name,base:tpl.base,ov:tpl.ov||'',flt:tpl.flt||'none',gc:tpl.gc||'#888',hp:Math.floor(tpl.maxHp*.65),maxHp:Math.floor(tpl.maxHp*.65),mp:30,maxMp:30,atk:Math.floor(tpl.atk*.88),def:Math.floor(tpl.def*.85),mat:Math.floor((tpl.mat||10)*.8),exp:0,level:1,status:null,statusTurns:0,defending:false,reflecting:false,atkBuffMult:1,atkBuffTurns:0,defBuffMult:1,defBuffTurns:0,allySkill:tpl.allySkill});
const initEnemy=tpl=>({...tpl,hp:tpl.maxHp,status:null,statusTurns:0,currentPhase:0,atkBonus:0,rageAoe:false,tripleAtk:false});
const checkLearn=(member,lv)=>{if(member.isMonster)return{member,newSpells:[]};const spells=CLASS_SPELLS[member.classId]||[];const newSpells=[];let lsp=[...(member.learnedSpells||[])];spells.forEach(sp=>{if(lv>=sp.level&&!lsp.includes(sp.id)){lsp.push(sp.id);newSpells.push(sp);}});return{member:{...member,learnedSpells:lsp},newSpells};};
const doLevelUp=(member,gainExp,addLog)=>{let m={...member,exp:(member.exp||0)+gainExp};while(m.exp>=calcNext(m.level)){const lv=m.level+1;m={...m,level:lv,maxHp:m.maxHp+28,hp:m.maxHp+28,maxMp:m.maxMp+10,mp:m.maxMp+10,atk:m.atk+(m.isMonster?4:5),def:m.def+3,mat:m.mat+(m.isMonster?2:5)};const{member:mm,newSpells}=checkLearn(m,lv);m=mm;SFX.lvup();addLog('🌟 '+mn(m)+'がLv.'+lv+'に！HP・MP全回復！');newSpells.forEach(sp=>addLog('✨ 新呪文「'+sp.name+'」を覚えた！'));}return m;};
const calcDamage=(atk,def)=>Math.max(1,atk-def+Math.floor(Math.random()*8)-4);
const processDot=e=>{if(!e.status||e.statusTurns<=0)return{...e,status:null,statusTurns:0};let hp=e.hp;if(e.status==='poison')hp=Math.max(1,hp-Math.floor(e.maxHp*.09));if(e.status==='burn')hp=Math.max(1,hp-Math.floor(e.maxHp*.07));const turns=e.statusTurns-1;return{...e,hp,statusTurns:turns,status:turns<=0?null:e.status};};
const tryInflict=(e,si,rate)=>{if(!si||e.status||Math.random()>rate)return e;return{...e,status:si,statusTurns:3};};
const decBuffs=m=>{let n={...m};if(n.atkBuffTurns>0){n.atkBuffTurns--;if(n.atkBuffTurns<=0)n.atkBuffMult=1;}if(n.defBuffTurns>0){n.defBuffTurns--;if(n.defBuffTurns<=0)n.defBuffMult=1;}n.reflecting=false;n.defending=false;return n;};

function App(){

  const [dragonBalls,setDragonBalls]=useState(0);

  const [clearCount,setClearCount]=useState(0);

  const [monsterRoster,setMonsterRoster]=useState([]); // 仲間モンスター全員(最大5)
  const [selExtra,setSelExtra]=useState([]); // 追加人間キャラ(3,4人目)

  useEffect(()=>{const d=ld();if(!d)return;if(d.clearCount)setClearCount(d.clearCount);if(d.savedParty)setSavedParty(d.savedParty);},[]);

  const uid=useRef(0),autoRef=useRef(autoMode);
  useEffect(()=>{autoRef.current=autoMode;},[autoMode]);

  const addLog=useCallback(m=>setLog(p=>[m,...p].slice(0,14)),[]);
  const addDmg=useCallback((v,type,x,y)=>{const id=uid.current++;setDmgs(p=>[...p,{id,v,type,x:x||'40%',y:y||'20%'}]);setTimeout(()=>setDmgs(p=>p.filter(d=>d.id!==id)),950);},[]);
  const addSpark=useCallback((x,y)=>{const id=uid.current++;setSparks(p=>[...p,{id,x,y}]);setTimeout(()=>setSparks(p=>p.filter(s=>s.id!==id)),700);},[]);
  const setPAnim=useCallback((i,a)=>setPAnims(p=>{const n=[...p];n[i]=a;return n;}),[]);
  const setMAnim=useCallback((i,a)=>setMAnims(p=>{const n=[...p];n[i]=a;return n;}),[]);

  const activePIdx=phase==='p0'?0:phase==='p1'?1:phase==='p2'?2:phase==='p3'?3:-1;
  const activeM=activePIdx>=0&&party[activePIdx]?party[activePIdx]:null;
  const chDef=CHAPTERS[chIdx]||CHAPTERS[9];
  const stage=STAGES[CH_STAGE[chIdx]||0];

  const getMemberSpells=useCallback(m=>{if(!m)return[];if(m.isMonster)return m.allySkill?[m.allySkill]:[];const cls=CLASSES[m.classId];const spells=[cls.baseSkill];(m.learnedSpells||[]).forEach(sid=>{const sp=(CLASS_SPELLS[m.classId]||[]).find(s=>s.id===sid);if(sp)spells.push(sp);});return spells;},[]);
  const nextPhase=useCallback((cur,p)=>{const order=['p0','p1','p2','p3'];const si=order.indexOf(cur);for(let i=si+1;i<order.length;i++){if(p[i]&&p[i].hp>0)return order[i];}return 'enemy';},[]);

  const executeSpell=useCallback(async(spell,pIdx,curP,curE,isField)=>{
    let nP=[...curP],nE=curE?[...curE]:[];
    const member={...nP[pIdx]};
    if((member.mp||0)<(spell.mp||0)){addLog('MP不足！');return null;}
    if(!isField){setPAnim(pIdx,'skill');setShowSkill(spell.e);}
    if(['atk_all','atk_one','atk_double'].includes(spell.type))SFX.magic();
    else if(['buff_atk','buff_def','buff_def_all','buff_both','reflect'].includes(spell.type))SFX.buff();
    else if(['heal_all','heal_all_mp'].includes(spell.type))SFX.heal();
    else if(spell.type==='revive')SFX.revive();
    if(!isField){await sleep(320);setShowSkill(null);setPAnim(pIdx,'idle');}
    nP[pIdx]={...member,mp:member.mp-spell.mp};
    if(spell.type==='atk_one'){
      const ti=nE.findIndex(e=>e.hp>0);if(ti<0)return{party:nP,enemies:nE};
      const en=nE[ti];
      let dmg=Math.max(1,(spell.pow||((c)=>0))(nP[pIdx])-(en.def||0)*.5);
      if(en.spellImmune){dmg=Math.max(1,Math.floor(dmg*.08));addLog('🔰 呪文がほとんど効かない！');}
      setMAnim(ti,'hurt');SFX.hit();addSpark('65%','30%');addDmg(Math.round(dmg),'e','65%','18%');
      addLog(spell.e+' '+spell.name+'！'+Math.round(dmg)+'ダメージ！');
      let nen={...en,hp:Math.max(0,en.hp-dmg)};if(spell.inflict)nen=tryInflict(nen,spell.inflict,.42);
      nE[ti]=nen;await sleep(250);setMAnim(ti,'idle');
    }else if(spell.type==='atk_all'||spell.type==='atk_double'){
      const live=nE.map((_,i)=>i).filter(i=>nE[i].hp>0);const hits=spell.type==='atk_double'?2:1;
      for(let h=0;h<hits;h++)for(const ti of live){if(nE[ti].hp<=0)continue;
        let dmg=Math.max(1,(spell.pow||((c)=>0))(nP[pIdx])-(nE[ti].def||0)*.4);if(spell.type==='atk_double'&&h===0)dmg=Math.floor(dmg*.85);
        if(nE[ti].spellImmune){dmg=Math.max(1,Math.floor(dmg*.08));addLog('🔰 '+nE[ti].name+'に呪文がほとんど効かない！');}
        const xp=60+ti*(-12);setMAnim(ti,'hurt');SFX.hit();addSpark(xp+'%','28%');addDmg(Math.round(dmg),'e',xp+'%','16%');
        let nen={...nE[ti],hp:Math.max(0,nE[ti].hp-dmg)};if(spell.inflict)nen=tryInflict(nen,spell.inflict,.38);nE[ti]=nen;await sleep(160);setMAnim(ti,'idle');}
      addLog(spell.e+' '+spell.name+'！全体に大ダメージ！');
    }else if(spell.type==='heal_all'){nP=nP.map(m=>m.hp<=0?m:{...m,hp:m.maxHp,status:null,statusTurns:0});addLog(spell.e+' '+spell.name+'！全員HP全回復！');
    }else if(spell.type==='heal_all_mp'){nP=nP.map(m=>m.hp<=0?m:{...m,hp:m.maxHp,mp:m.maxMp,status:null,statusTurns:0});addLog(spell.e+' '+spell.name+'！全員HP・MP完全回復！');
    }else if(spell.type==='buff_atk'){nP[pIdx]={...nP[pIdx],atkBuffMult:2.0,atkBuffTurns:3};addLog(spell.e+' '+spell.name+'！ATK 3ターン2倍！');
    }else if(spell.type==='buff_def_all'){nP=nP.map(m=>m.hp<=0?m:{...m,defBuffMult:1.8,defBuffTurns:3});addLog(spell.e+' '+spell.name+'！全員DEF UP！');
    }else if(spell.type==='buff_both'){nP[pIdx]={...nP[pIdx],atkBuffMult:2.0,atkBuffTurns:4,defBuffMult:2.0,defBuffTurns:4};addLog(spell.e+' '+spell.name+'！ATK・DEF 4ターン2倍！');
    }else if(spell.type==='reflect'){nP[pIdx]={...nP[pIdx],reflecting:true};addLog(spell.e+' '+spell.name+'！次の魔法を反射！');
    }else if(spell.type==='revive'){const di=nP.findIndex(m=>m.hp<=0);if(di<0){addLog('戦闘不能の仲間がいない！');nP[pIdx]={...nP[pIdx],mp:member.mp};return{party:nP,enemies:nE};}nP[di]={...nP[di],hp:Math.floor(nP[di].maxHp*.5)};addLog(spell.e+' '+spell.name+'！'+mn(nP[di])+'が復活！HP50%！');}
    return{party:nP,enemies:nE};
  },[addLog,addDmg,addSpark,setPAnim,setMAnim]);

  const useFieldSpell=useCallback(async(spell,pIdx)=>{
    if(!FIELD_SPELL_TYPES.includes(spell.type)){addLog('⚔️ この呪文は戦闘中のみ使用可能！');return;}
    const r=await executeSpell(spell,pIdx,[...party],null,true);if(r)setParty(r.party);
  },[party,executeSpell,addLog]);

  const handleVictory=useCallback(async(fp,fe)=>{
    SFX.victory();bgm('victory');

    let p2=fp.map(m=>{if(m.hp<=0)return m;const prevLv=m.level;const nm=doLevelUp(m,tExp,msg=>lvLogs.push(msg));if(nm.level>prevLv)SFX.lvup();return nm;});
    setParty(p2);setGold(g=>g+tGold);await sleep(500);
    let newDB=dragonBalls,gotDB=false;
    if(Math.random()<.30&&dragonBalls<3){newDB=dragonBalls+1;setDragonBalls(newDB);SFX.dragonball();gotDB=true;setDbPopup(true);setTimeout(()=>setDbPopup(false),3000);}
    const isBoss=fe.some(e=>e.boss);

    let recruitTpls=[];

  },[chIdx,chBattleNum,clearCount,dragonBalls,monsterRoster,addLog]);

  const closeResult=useCallback((chosenTpl,doSwap)=>{

      addLog('🤝 '+chosenTpl.name+'がなかまになった！（ロスター:'+newRoster.length+'/5）');
    }
    setBattleResult(null);
    if(isFinal){const cc=clearCount+1;setClearCount(cc);setSavedParty(party);sv({clearCount:cc,savedParty:party});stopBgm();setScr('ending');return;}
    if(isChClear){const next=chIdx+1;setChIdx(next);setChBattleNum(1);setScr('map');bgm('field');setStoryScreen(CHAPTERS[next]);}
    else if(doSwap){setScr('party_mgmt');}

        <div style={{position:'absolute',bottom:0,left:0,right:0,height:'60px',background:`linear-gradient(transparent,${stage.gnd})`,borderTop:`1px solid ${stage.gb}`}}/>
        {party.map((m,i)=>(<div key={i} style={{position:'absolute',bottom:'28px',left:(4+i*22)+'%',transformOrigin:'bottom center'}}>{m.isMonster?<MonPartySprite mon={m} anim={pAnims[i]}/>:<CharSprite member={m} anim={pAnims[i]}/>}</div>))}
        {enemies.map((en,i)=>(<div key={i} style={{position:'absolute',bottom:'24px',right:(enemies.length===1?8:5+i*22)+'%',transformOrigin:'bottom center'}}><MonSprite mon={en} anim={mAnims[i]} size={en.big?5.2:enemies.length===1?5.2:4.4}/></div>))}
        <div style={{position:'absolute',top:'8px',left:'50%',transform:'translateX(-50%)',fontSize:'.66rem',color:'rgba(255,255,255,.28)',whiteSpace:'nowrap'}}>{chDef.n}</div>
        {enemies.some(e=>e.boss)&&<div style={{position:'absolute',top:'8px',left:'8px',fontSize:'.68rem',color:'#ef4444',fontWeight:900,animation:'blink 1s ease-in-out infinite'}}>⚠️BOSS</div>}
        {autoMode&&<div style={{position:'absolute',top:'8px',right:'8px',fontSize:'.65rem',color:'#22c55e',background:'rgba(34,197,94,.18)',padding:'2px 6px',borderRadius:'5px'}}>AUTO▶</div>}
        {showSkill&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'5rem',animation:'skillFlash .65s ease forwards',zIndex:50,pointerEvents:'none'}}>{showSkill}</div>}
        {dmgs.map(d=>(<div key={d.id} style={{position:'absolute',fontWeight:900,fontSize:'1.8rem',pointerEvents:'none',zIndex:100,animation:'dmgUp .95s ease forwards',textShadow:'0 2px 8px rgba(0,0,0,.95)',color:d.type==='e'?'#ff5555':d.type==='h'?'#4ade80':'#ffd700',left:d.x,top:d.y}}>{d.type==='h'?'+'+d.v:'-'+d.v}</div>))}
        {sparks.map(s=>Array.from({length:7},(_,si)=>{const a=(si/7)*Math.PI*2,dist=25+Math.random()*20;return <div key={s.id+'_'+si} style={{position:'absolute',width:'6px',height:'6px',borderRadius:'50%',left:s.x,top:s.y,background:`hsl(${14+si*14},100%,62%)`,pointerEvents:'none',zIndex:60,animation:'sparkFly .62s ease forwards','--tx':Math.cos(a)*dist+'px','--ty':Math.sin(a)*dist+'px'}}/>;}))}
      </div>
      <div className="card" style={{borderColor:'rgba(220,38,38,.18)'}}>
        {enemies.map((en,i)=>(<HpBar key={i} hp={en.hp} maxHp={en.maxHp} label={en.base+(en.ov||'')+' '+en.name+(en.boss?' 👑':'')+(en.spellImmune?' 🔰呪文無効':'')} color={en.boss?'#dc2626':'#ef4444'} small/>))}
        <div style={{borderTop:'1px solid rgba(255,255,255,.05)',margin:'5px 0'}}/>
        {party.map((m,i)=>{const mc=m.isMonster?'#4ade80':CLASSES[m.classId]?.color||'#fff';const bStr=[];if(m.atkBuffMult>1)bStr.push('ATK↑');if(m.defBuffMult>1)bStr.push('DEF↑');if(m.reflecting)bStr.push('反射');
          return(<div key={i}><HpBar hp={m.hp} maxHp={m.maxHp} label={mn(m)+' Lv.'+m.level+(m.status?' ['+m.status+']':'')+(bStr.length?' ✨'+bStr.join('/'):'')} color={mc} small/><div style={{display:'flex',gap:'4px',marginBottom:'3px',alignItems:'center',fontSize:'.65rem',color:'#374151'}}><span>MP:{m.mp}/{m.maxMp}</span><MpBar mp={m.mp} maxMp={m.maxMp}/></div></div>);})}
      </div>
      <div className="card" style={{borderColor:'rgba(212,160,23,.1)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
          <div style={{fontSize:'.82rem',fontWeight:900,color:activeM?(activeM.isMonster?'#4ade80':CLASSES[activeM.classId]?.color||'#fff'):'#374151'}}>{phase==='enemy'?'💢 敵のターン…':activeM?mn(activeM)+'のターン！':''}</div>
          <button onClick={()=>setAutoMode(v=>!v)} style={{background:autoMode?'rgba(34,197,94,.22)':'rgba(80,80,90,.18)',border:`1px solid ${autoMode?'#22c55e':'#1e1e3a'}`,color:autoMode?'#22c55e':'#374151',padding:'4px 12px',borderRadius:'16px',fontSize:'.75rem',fontWeight:900,cursor:'pointer'}}>{autoMode?'AUTO●':'AUTO○'}</button>
        </div>
        {!spellMenu&&(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
          {[{l:'⚔️ こうげき',s:'通常攻撃',c:'#dc2626',dis:busy||autoMode||phase==='enemy',fn:()=>handleAction('atk',null)},
            {l:'✨ 呪文',s:activeMemberSpells.length+'個使用可',c:'#8b5cf6',dis:busy||autoMode||phase==='enemy'||activeMemberSpells.length===0,fn:()=>setSpellMenu(true)},
            {l:'🌿 アイテム',s:inv.length+'個所持',c:'#16a34a',dis:busy||autoMode||inv.length===0||phase==='enemy',fn:()=>handleAction('heal',null)},
            {l:'🛡️ 防御',s:'ダメージ55%減',c:'#0ea5e9',dis:busy||autoMode||phase==='enemy',fn:()=>handleAction('defend',null)},
            {l:'🏃 にげる',s:'60%成功',c:'#4b5563',dis:busy||autoMode||phase==='enemy',fn:()=>handleAction('flee',null)},
          ].map(b=>(<button key={b.l} disabled={b.dis} onClick={b.fn} style={{...bs(b.c,b.dis),margin:0,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',padding:'11px 6px',gridColumn:b.l==='🏃 にげる'?'1/-1':undefined}}><span style={{fontSize:'.9rem'}}>{b.l}</span><span style={{fontSize:'.62rem',opacity:.72,fontWeight:'normal'}}>{b.s}</span></button>))}
        </div>)}
        {spellMenu&&activeM&&(<div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'7px'}}>
            <span style={{fontSize:'.8rem',fontWeight:900,color:'#a78bfa'}}>✨ 呪文を選べ — {mn(activeM)}</span>
            <button onClick={()=>setSpellMenu(false)} style={{background:'transparent',border:'1px solid #2a2a4a',color:'#64748b',padding:'3px 8px',borderRadius:'8px',fontSize:'.75rem',cursor:'pointer'}}>← もどる</button>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px',maxHeight:'240px',overflowY:'auto'}}>
            {activeMemberSpells.map((sp,i)=>{const noMp=(activeM.mp||0)<(sp.mp||0);return(<button key={sp.id||i} disabled={busy||noMp} onClick={()=>{setSpellMenu(false);handleAction('spell',sp.id);}} style={{...bs(sp.color||'#8b5cf6',busy||noMp),margin:0,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',padding:'10px 5px',fontSize:'.78rem'}}><span style={{fontSize:'1.1rem'}}>{sp.e}</span><span style={{fontWeight:900}}>{sp.name}</span><span style={{fontSize:'.6rem',opacity:.75,textAlign:'center'}}>{sp.desc}</span><span style={{fontSize:'.65rem',color:noMp?'#ef4444':'#38bdf8'}}>MP:{sp.mp}</span></button>);})}
          </div>
        </div>)}
      </div>
    </>)}

    {/* SHOP */}
    {scr==='shop'&&(<div className="card" style={{animation:'fadeIn .3s ease',borderColor:'rgba(212,160,23,.16)'}}>
      <div style={{color:'#d4a017',fontWeight:900,textAlign:'center',marginBottom:'8px'}}>🛒 ショップ　Gold: {gold}</div>
      {ITEMS.map(item=>(<div key={item.id} style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'6px',padding:'8px',background:'rgba(255,255,255,.025)',borderRadius:'9px'}}><span style={{fontSize:'1.3rem'}}>{item.emoji}</span><div style={{flex:1}}><div style={{fontSize:'.82rem',fontWeight:'bold'}}>{item.name}</div><div style={{fontSize:'.68rem',color:'#4b5563'}}>{item.desc}</div></div><button onClick={()=>buyItem(item)} disabled={gold<item.cost} style={{...bs('#d97706',gold<item.cost),margin:0,padding:'7px 10px',fontSize:'.78rem'}}>{item.cost}G</button></div>))}
      <div style={{textAlign:'center',marginTop:'8px'}}><button style={bs('#374151')} onClick={()=>{SFX.cursor();setScr('map');bgm('field');}}>🔙 もどる</button></div>
    </div>)}

    {/* GAME OVER */}
    {scr==='gameover'&&(<div className="card" style={{textAlign:'center',animation:'popIn .5s ease',borderColor:'rgba(220,38,38,.3)'}}>
      <div style={{fontSize:'4rem',marginBottom:'7px'}}>💀</div>
      <div style={{color:'#dc2626',fontSize:'1.5rem',fontWeight:900,marginBottom:'4px'}}>GAME OVER</div>
      <div style={{color:'#4b5563',marginBottom:'14px',fontSize:'.85rem'}}>パーティは全滅した…</div>
      <button style={bs('#dc2626')} onClick={()=>{setParty([]);setEnemies([]);setLog([]);setScr('title');stopBgm();}}>🔄 タイトルへ</button>
    </div>)}

    {/* ENDING */}
    {scr==='ending'&&(<div className="card" style={{animation:'popIn .5s ease',borderColor:'rgba(212,160,23,.4)',textAlign:'center'}}>
      <div style={{fontSize:'4rem',marginBottom:'8px',animation:'winSpin .8s ease-in-out infinite'}}>🏆</div>
      <div style={{color:'#d4a017',fontSize:'1.3rem',fontWeight:900,marginBottom:'10px'}}>🎉 ゲームクリア！ 🎉</div>
      <div style={{color:'#94a3b8',fontSize:'.88rem',lineHeight:2.1,marginBottom:'16px',background:'rgba(0,0,0,.35)',padding:'14px 16px',borderRadius:'12px',textAlign:'left',borderLeft:'3px solid #d4a017'}}>
        悪魔サタンが消滅した！<br/>
        天空城が崩れる中、ゆうりはフィリア姫を抱えて脱出した。<br/><br/>
        <span style={{color:'#f9a8d4',fontWeight:900}}>「ありがとう…ゆうりさん、そうやさん。あなたたちは世界の英雄です！」</span><br/><br/>
        ドゴール地方を覆っていた闇が晴れ、太陽の光が降り注ぐ。<br/>
        カシミール地方にも朗報が届き、村全体が歓声に包まれた。<br/><br/>
        <span style={{color:'#d4a017',fontWeight:900}}>こうして世界に平和が戻った。ゆうりとそうやの伝説は永遠に語り継がれることになった——。</span>
      </div>
      <div style={{fontSize:'.78rem',color:'#4b5563',marginBottom:'10px'}}>{party.map(m=>mn(m)+' Lv.'+m.level).join(' / ')}<br/>クリア回数: {clearCount}回</div>
      <div style={{display:'flex',justifyContent:'center',gap:'8px',flexWrap:'wrap'}}>
        <button style={bs('#22c55e')} onClick={doSave}>💾 セーブ</button>
        {monsterRoster.length>0&&<button style={bs('#60a5fa')} onClick={()=>{SFX.cursor();setScr('party_mgmt');}}>👥 なかま管理</button>}
        <button style={bs('#d4a017')} onClick={()=>{setParty([]);setEnemies([]);setLog([]);stopBgm();setScr('title');}}>🔄 タイトルへ</button>
      </div>
    </div>)}

    {/* LOG */}
    {scr!=='title'&&scr!=='select'&&scr!=='ng_choice'&&(<div className="card" style={{maxHeight:'120px',overflowY:'auto',borderColor:'rgba(255,255,255,.04)'}}>
      {log.map((e,i)=>(<div key={i} style={{padding:'2px 0',fontSize:'.76rem',lineHeight:1.5,borderBottom:'1px solid rgba(255,255,255,.04)',opacity:1-i*.07,color:i===0?'#c8d4e8':'#374151'}}>{e}</div>))}
    </div>)}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
