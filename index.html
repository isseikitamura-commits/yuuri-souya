function gac(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tn(f,t,dur,vol,wave){
  if(!f||_muted)return;
  vol=vol||0.18;wave=wave||'square';
  try{const c=gac(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=wave;o.frequency.value=f;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.9);
  o.start(t);o.stop(t+dur);}catch(e){}
}

function bgm(name){if(_bcur===name)return;stopBgm();_bcur=name;_bgmLoop(name);}
function _bgmLoop(name){
  if(_bcur!==name||_muted)return;
  const b=BGMS[name];if(!b)return;
  try{
    const c=gac();let t=c.currentTime+0.06;const bd=60/b.bpm;
    b.s.forEach(([f,beats])=>{tn(f,t,beats*bd*0.88,0.18,'square');t+=beats*bd;});
    if(b.loop===false){_btid=null;return;}
    _btid=setTimeout(()=>_bgmLoop(name),(t-c.currentTime)*1000-100);
  }catch(e){}
}
function stopBgm(){_bcur=null;if(_btid)clearTimeout(_btid);_btid=null;}
function toggleMute(){_muted=!_muted;if(_muted)stopBgm();return _muted;}

// ===== UI COMPONENTS =====
function HpBar({hp,maxHp,label,color,small}){
  const pct=Math.max(0,(hp/maxHp)*100);
  const col=pct>50?'#22c55e':pct>25?'#facc15':'#ef4444';
  const fs=small?'0.7rem':'0.8rem';
  return(
    <div style={{marginBottom:small?'3px':'6px'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:fs,marginBottom:'2px'}}>
        <span style={{color,fontWeight:900}}>{label}</span>
        <span style={{color:'#4b5563'}}>{Math.max(0,Math.round(hp))}/{maxHp}</span>
      </div>
      <div className="hpt" style={{marginBottom:'1px'}}>
        <div className="hpf" style={{width:pct+'%',background:'linear-gradient(90deg,'+col+','+col+'99)',boxShadow:'0 0 5px '+col+'77'}}/>
      </div>
    </div>
  );
}
function MpBar({mp,maxMp}){
  const pct=Math.max(0,(mp/maxMp)*100);
  return <div className="mpt"><div className="mpf" style={{width:pct+'%'}}/></div>;
}
function ExpBar({exp,level}){
  const prev=level<=1?0:calcNext(level-1);
  const nxt=calcNext(level);
  const cur=exp-prev,need=nxt-prev;
  const pct=Math.min(100,(cur/need)*100);
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.68rem',color:'#5555e8',marginBottom:'2px'}}>
        <span>EXP</span><span>{cur}/{need}（次まで{need-cur}）</span>
      </div>
      <div className="expt"><div className="expf" style={{width:pct+'%'}}/></div>
    </div>
  );
}

// Human character sprite with head+body+legs layout
function CharSprite({classId,hp,maxHp,status,anim}){
  const v=CHAR_VISUALS[classId];
  const cls=CLASSES[classId];
  const alive=hp>0;
  const crit=hp/maxHp<0.25;
  let flt='drop-shadow(0 0 8px '+cls.color+'66)';
  if(!alive) flt='grayscale(1)';
  else if(status==='poison') flt='drop-shadow(0 0 10px #a855f7) hue-rotate(70deg)';
  else if(status==='burn') flt='drop-shadow(0 0 12px #ef4444)';
  else if(status==='stun') flt='drop-shadow(0 0 10px #fbbf24)';
  else if(crit) flt='drop-shadow(0 0 12px #ef444488)';

  let mainAnim='floatB 3.2s ease-in-out infinite';
  if(!alive) mainAnim='none';
  else if(anim==='atk') mainAnim='charAtk 0.42s ease';
  else if(anim==='hurt') mainAnim='shakeX 0.38s ease';
  else if(anim==='skill') mainAnim='winSpin 0.5s ease';

  const stIcon=status==='poison'?'☠️':status==='burn'?'🔥':status==='stun'?'💫':null;

  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',position:'relative',animation:mainAnim,filter:flt,opacity:alive?1:0.22,transformOrigin:'bottom center',transition:'opacity 0.4s'}}>
      {stIcon&&<div style={{position:'absolute',top:'-10px',right:'-4px',fontSize:'0.65rem',zIndex:10}}>{stIcon}</div>}
      {/* Head */}
      <div style={{fontSize:'2.1rem',lineHeight:1}}>{v.face}</div>
      {/* Body + weapon */}
      <div style={{display:'flex',alignItems:'center',lineHeight:1,marginTop:'-2px',gap:'2px'}}>
        {v.shield&&<span style={{fontSize:'1rem'}}>{v.shield}</span>}
        <span style={{fontSize:'1.9rem'}}>{v.body}</span>
        {v.weapon&&<span style={{fontSize:'1.1rem'}}>{v.weapon}</span>}
      </div>
      {/* Legs */}
      <div style={{fontSize:'1.4rem',lineHeight:1,marginTop:'-2px'}}>{v.legs}</div>
      {/* Name */}
      <div style={{fontSize:'0.6rem',color:cls.color,fontWeight:900,marginTop:'1px'}}>{cls.name}</div>
    </div>
  );
}

// Monster sprite (enemies and recruited monsters)
function MonSprite({mon,anim,size}){
  size=size||5;
  const alive=mon.hp>0;
  let flt=(mon.flt||'none');

  else if(anim==='hurt') flt=(mon.flt||'none')+' drop-shadow(0 0 22px rgba(255,50,0,1)) brightness(1.7)';
  else flt=(mon.flt||'none')+' drop-shadow(0 0 10px '+(mon.gc||'#888')+'99)';

  let mainAnim='floatA 2.8s ease-in-out infinite';
  if(!alive) mainAnim='none';
  else if(anim==='hurt') mainAnim='shakeX 0.42s ease';
  else if(anim==='atk') mainAnim='monAtk 0.42s ease';

  return(
    <div style={{position:'relative',display:'inline-block',opacity:alive?1:0,transition:'opacity 0.5s'}}>
      <span style={{fontSize:size+'rem',lineHeight:1,display:'block',filter:flt,animation:mainAnim,transformOrigin:'bottom center'}}>{mon.base}</span>
      {mon.ov&&<span style={{position:'absolute',top:'-8px',right:'-7px',fontSize:(size*0.34)+'rem',pointerEvents:'none'}}>{mon.ov}</span>}
      {mon.status&&<span style={{position:'absolute',top:'-14px',left:'50%',transform:'translateX(-50%)',fontSize:'0.7rem'}}>{mon.status==='poison'?'☠️':mon.status==='burn'?'🔥':'💫'}</span>}
    </div>
  );
}

// ===== GAME LOGIC HELPERS =====
function initHuman(classId){
  const c=CLASSES[classId];
  return{isMonster:false,classId,...c,hp:c.hp,maxHp:c.hp,mp:c.mp,maxMp:c.mp,
    atk:c.atk,def:c.def,mat:c.mat,exp:0,level:1,
    status:null,statusTurns:0,defending:false,reflecting:false,
    atkBuffMult:1,atkBuffTurns:0,defBuffMult:1,defBuffTurns:0,
    learnedSpells:[],baseSkillUsed:false};
}
function initMonsterAlly(tpl){
  return{isMonster:true,monsterId:tpl.id,name:tpl.name,base:tpl.base,ov:tpl.ov,flt:tpl.flt,gc:tpl.gc,
    hp:Math.floor(tpl.maxHp*0.65),maxHp:Math.floor(tpl.maxHp*0.65),
    mp:25,maxMp:25,atk:Math.floor(tpl.atk*0.88),def:Math.floor(tpl.def*0.85),mat:Math.floor((tpl.mat||10)*0.8),
    exp:0,level:1,status:null,statusTurns:0,defending:false,reflecting:false,
    atkBuffMult:1,atkBuffTurns:0,defBuffMult:1,defBuffTurns:0,
    allySkill:tpl.allySkill,allySkillUsed:false};
}
function initEnemy(tpl){
  return{...tpl,hp:tpl.maxHp,status:null,statusTurns:0,
    currentPhase:0,atkBonus:0,matBonus:0,rageAoe:false,tripleAtk:false};
}

function checkLearnSpells(member,newLevel){
  if(member.isMonster) return{member,newSpells:[]};
  const spells=CLASS_SPELL_LEARN[member.classId]||[];
  const newSpells=[];
  let lsp=[...member.learnedSpells];
  spells.forEach(sp=>{
    if(newLevel>=sp.level&&!lsp.includes(sp.id)){
      lsp.push(sp.id);newSpells.push(sp);
    }
  });
  return{member:{...member,learnedSpells:lsp},newSpells};
}

function doLevelUp(member,gainExp,addLogFn){
  let m={...member,exp:(member.exp||0)+gainExp};
  while(m.exp>=calcNext(m.level)){
    const newLv=m.level+1;
    m={...m,level:newLv,
      maxHp:m.maxHp+28,hp:m.maxHp+28,
      maxMp:m.maxMp+10,mp:m.maxMp+10,
      atk:m.atk+(m.isMonster?4:5),def:m.def+(m.isMonster?3:3),mat:m.mat+(m.isMonster?2:5)};
    const {member:mm,newSpells}=checkLearnSpells(m,newLv);
    m=mm;
    SFX.lvup();
    addLogFn('🌟 '+(m.isMonster?m.name:(CLASSES[m.classId]?.name||m.name))+'がLv.'+newLv+'に！HP・MP全回復！');
    newSpells.forEach(sp=>{addLogFn('✨ 新しい呪文「'+sp.name+'」を覚えた！');});
  }
  return m;
}

function calcDamage(atk,def,rand){
  rand=rand===undefined?Math.floor(Math.random()*8)-4:rand;
  return Math.max(1,atk-def+rand);
}

function processStatusDot(entity){
  if(!entity.status||entity.statusTurns<=0)return{...entity,status:null,statusTurns:0};
  let hp=entity.hp;
  if(entity.status==='poison') hp=Math.max(1,hp-Math.floor(entity.maxHp*0.09));
  if(entity.status==='burn') hp=Math.max(1,hp-Math.floor(entity.maxHp*0.07));
  const turns=entity.statusTurns-1;
  return{...entity,hp,statusTurns:turns,status:turns<=0?null:entity.status};
}

function tryInflict(entity,si,rate){
  if(!si||entity.status||Math.random()>rate)return entity;
  return{...entity,status:si,statusTurns:3};
}

function decrementBuffs(member){
  let m={...member};
  if(m.atkBuffTurns>0){m.atkBuffTurns--;if(m.atkBuffTurns<=0)m.atkBuffMult=1;}
  if(m.defBuffTurns>0){m.defBuffTurns--;if(m.defBuffTurns<=0)m.defBuffMult=1;}
  if(m.reflecting)m.reflecting=false; // reflect only lasts 1 hit
  m.defending=false;
  return m;
}

// ===== MAIN APP =====
function App(){
  const [scr,setScr]=useState('title');
  const [party,setParty]=useState([]);
  const [enemies,setEnemies]=useState([]);
  const [selCls,setSelCls]=useState([]);
  const [stIdx,setStIdx]=useState(0);
  const [encK,setEncK]=useState(0);
  const [inv,setInv]=useState([]);
  const [gold,setGold]=useState(280);
  const [log,setLog]=useState([]);
  const [busy,setBusy]=useState(false);
  const [phase,setPhase]=useState('p0'); // p0,p1,p2,p3,enemy
  const [pAnims,setPAnims]=useState(['idle','idle','idle','idle']);
  const [mAnims,setMAnims]=useState(['idle','idle']);
  const [showSkill,setShowSkill]=useState(null);
  const [dmgs,setDmgs]=useState([]);
  const [sparks,setSparks]=useState([]);
  const [autoMode,setAutoMode]=useState(false);
  const [isMuted,setIsMuted]=useState(false);
  const [saveMsg,setSaveMsg]=useState('');
  const [spellMenu,setSpellMenu]=useState(false); // show spell sub-menu
  const [recruitOffer,setRecruitOffer]=useState(null); // {tpl} or null
  const [lvUpMsgs,setLvUpMsgs]=useState([]);
  const uid=useRef(0);
  const autoRef=useRef(autoMode);
  useEffect(()=>{autoRef.current=autoMode;},[autoMode]);

  const addLog=useCallback(m=>setLog(p=>[m,...p].slice(0,14)),[]);
  const addDmg=useCallback((v,type,x,y)=>{
    const id=uid.current++;
    setDmgs(p=>[...p,{id,v,type,x:x||'40%',y:y||'20%'}]);
    setTimeout(()=>setDmgs(p=>p.filter(d=>d.id!==id)),950);
  },[]);
  const addSpark=useCallback((x,y)=>{
    const id=uid.current++;
    setSparks(p=>[...p,{id,x,y}]);
    setTimeout(()=>setSparks(p=>p.filter(s=>s.id!==id)),700);
  },[]);
  const setPAnim=useCallback((i,a)=>setPAnims(p=>{const n=[...p];n[i]=a;return n;}),[]);
  const setMAnim=useCallback((i,a)=>setMAnims(p=>{const n=[...p];n[i]=a;return n;}),[]);

  // Active party member index
  const activePIdx=phase==='p0'?0:phase==='p1'?1:phase==='p2'?2:phase==='p3'?3:-1;
  const activeM=activePIdx>=0&&party[activePIdx]?party[activePIdx]:null;

  // Get available spells for a party member
  const getMemberSpells=useCallback((member)=>{
    if(!member||member.isMonster) return member?.allySkill?[member.allySkill]:[];
    const cls=CLASSES[member.classId];
    const spells=[cls.baseSkill];
    (member.learnedSpells||[]).forEach(sid=>{
      const sp=(CLASS_SPELL_LEARN[member.classId]||[]).find(s=>s.id===sid);
      if(sp) spells.push(sp);
    });
    return spells;
  },[]);

  // Advance phase to next alive party member (or enemy)
  const nextPhase=useCallback((currentPhase,currentParty,skipToEnemy)=>{
    if(skipToEnemy) return 'enemy';
    const order=['p0','p1','p2','p3'];
    const startIdx=order.indexOf(currentPhase);
    for(let i=startIdx+1;i<order.length;i++){
      const pi=i;
      if(currentParty[pi]&&currentParty[pi].hp>0) return order[pi];
    }
    return 'enemy';
  },[]);

  // Start a battle encounter
  const startBattle=useCallback((partyOverride,stIdxO,encKO)=>{
    const st=stIdxO!==undefined?stIdxO:stIdx;
    const ek=encKO!==undefined?encKO:encK;
    const encGroup=ENC[st][Math.min(ek,3)];
    const ens=encGroup.map(e=>initEnemy(e));
    const isBoss=ek>=3;
    setEnemies(ens);
    setMAnims(new Array(ens.length).fill('idle'));
    const firstAlive=party.findIndex(m=>m.hp>0);
    setPhase(firstAlive>=0?['p0','p1','p2','p3'][firstAlive]:'p0');
    setSpellMenu(false);
    setBusy(false);
    const useParty=partyOverride||party;
    if(partyOverride) setParty(partyOverride);
    addLog('⚠️ '+ens.map(e=>e.name).join(' & ')+'が現れた！'+(isBoss?'🚨 ボス！':''));
    const bgmKey=isBoss&&st===3?'final':isBoss?'boss':'battle';
    bgm(bgmKey);
    setScr('battle');
  },[stIdx,encK,party,addLog]);

  // Execute spell
  const executeSpell=useCallback(async(spell,pIdx,currentParty,currentEnemies)=>{
    let nParty=[...currentParty];
    let nEnemies=[...currentEnemies];
    const member={...nParty[pIdx]};
    if(member.mp<spell.mp){addLog('MP不足！（必要'+spell.mp+'MP）');return null;}

    setPAnim(pIdx,'skill');
    setShowSkill(spell.e);

    // SFX by type
    if(spell.type==='atk_all'||spell.type==='atk_one'||spell.type==='atk_double'||spell.type==='atk_one_stun'){
      if(spell.id==='hyado'||spell.id==='ionazun') SFX.ice();
      else if(spell.id==='bagikuro'||spell.id==='force') SFX.wind();
      else if(spell.id==='sacred'||spell.id==='holyblade'||spell.id==='swordstorm') SFX.holy();
      else SFX.magic();
    } else if(spell.type==='buff_atk'||spell.type==='buff_def'||spell.type==='buff_def_all'||spell.type==='buff_both') SFX.buff();
    else if(spell.type==='heal_all'||spell.type==='heal_all_mp') SFX.heal();
    else if(spell.type==='revive') SFX.revive();
    else SFX.skill();

    await sleep(320);setShowSkill(null);setPAnim(pIdx,'idle');

    const mp=member.mp-spell.mp;
    nParty[pIdx]={...member,mp,baseSkillUsed:spell.id===CLASSES[member.classId]?.baseSkill?.id?true:member.baseSkillUsed,allySkillUsed:member.isMonster?true:member.allySkillUsed};

    // Execute by type
    if(spell.type==='atk_one'||spell.type==='atk_one_stun'){
      const ti=nEnemies.findIndex(e=>e.hp>0);
      if(ti<0) return{party:nParty,enemies:nEnemies};
      const en=nEnemies[ti];
      let dmg=Math.max(1,spell.fn(nParty[pIdx])-(en.def||0)*0.5);
      if(en.reflecting){addLog('💠 呪文が反射された！');nParty[pIdx]={...nParty[pIdx],hp:Math.max(0,nParty[pIdx].hp-dmg)};return{party:nParty,enemies:nEnemies};}
      setMAnim(ti,'hurt');SFX.hit();addSpark('65%','30%');addDmg(Math.round(dmg),'e','65%','18%');
      addLog(spell.e+' '+spell.name+'！'+Math.round(dmg)+'ダメージ！');
      let nen={...en,hp:Math.max(0,en.hp-dmg)};
      if(spell.inflict) nen=tryInflict(nen,spell.inflict,0.42);
      if(spell.type==='atk_one_stun') nen=tryInflict(nen,'stun',0.45);
      nEnemies[ti]=nen;
      await sleep(250);setMAnim(ti,'idle');
    }
    else if(spell.type==='atk_all'||spell.type==='atk_double'){
      const liveIdx=nEnemies.map((_,i)=>i).filter(i=>nEnemies[i].hp>0);
      const hits=spell.type==='atk_double'?2:1;
      for(let h=0;h<hits;h++){
        for(const ti of liveIdx){
          if(nEnemies[ti].hp<=0) continue;
          let dmg=Math.max(1,spell.fn(nParty[pIdx])-(nEnemies[ti].def||0)*0.4);
          if(spell.type==='atk_double'&&h===0) dmg=Math.floor(dmg*0.85);
          const xp=60+ti*(-12);
          setMAnim(ti,'hurt');SFX.hit();addSpark(xp+'%','28%');addDmg(Math.round(dmg),'e',xp+'%','16%');
          let nen={...nEnemies[ti],hp:Math.max(0,nEnemies[ti].hp-dmg)};
          if(spell.inflict) nen=tryInflict(nen,spell.inflict,0.38);
          nEnemies[ti]=nen;
          await sleep(160);setMAnim(ti,'idle');
        }
      }
      addLog(spell.e+' '+spell.name+'！全体に'+(spell.type==='atk_double'?'2回攻撃！':'大ダメージ！'));
    }
    else if(spell.type==='heal_all'){
      nParty=nParty.map(m=>{
        if(m.hp<=0) return m;
        const add=m.maxHp-m.hp;
        if(add>0) addDmg('全回復','h');
        return{...m,hp:m.maxHp,status:null,statusTurns:0};
      });
      addLog(spell.e+' '+spell.name+'！パーティ全員HP全回復！');
    }
    else if(spell.type==='heal_all_mp'){
      nParty=nParty.map(m=>m.hp<=0?m:{...m,hp:m.maxHp,mp:m.maxMp,status:null,statusTurns:0});
      addLog(spell.e+' '+spell.name+'！全員HP・MP完全回復！');
    }
    else if(spell.type==='buff_atk'){
      nParty[pIdx]={...nParty[pIdx],atkBuffMult:2.0,atkBuffTurns:3};
      addLog(spell.e+' '+spell.name+'！ATKが3ターン2倍になった！');
    }
    else if(spell.type==='buff_def'||spell.type==='buff_def_all'){
      if(spell.type==='buff_def_all'){
        nParty=nParty.map(m=>m.hp<=0?m:{...m,defBuffMult:1.8,defBuffTurns:3});
      } else {
        nParty[pIdx]={...nParty[pIdx],defBuffMult:1.8,defBuffTurns:3};
      }
      addLog(spell.e+' '+spell.name+'！防御力が3ターンUP！');
    }
    else if(spell.type==='buff_both'){
      nParty[pIdx]={...nParty[pIdx],atkBuffMult:2.0,atkBuffTurns:4,defBuffMult:2.0,defBuffTurns:4};
      addLog(spell.e+' '+spell.name+'！ATK・DEF両方4ターン2倍！');
    }
    else if(spell.type==='reflect'){
      nParty[pIdx]={...nParty[pIdx],reflecting:true};
      addLog(spell.e+' '+spell.name+'！次の魔法攻撃を反射する！');
    }
    else if(spell.type==='revive'){
      const di=nParty.findIndex(m=>m.hp<=0);
      if(di<0){addLog('戦闘不能の仲間がいない！');nParty[pIdx]={...nParty[pIdx],mp:member.mp}; // refund
        return{party:nParty,enemies:nEnemies};}
      nParty[di]={...nParty[di],hp:Math.floor(nParty[di].maxHp*0.5)};
      addLog(spell.e+' '+spell.name+'！'+(nParty[di].isMonster?nParty[di].name:CLASSES[nParty[di].classId].name)+'が復活！HP50%！');
    }

    return{party:nParty,enemies:nEnemies};
  },[addLog,addDmg,addSpark,setPAnim,setMAnim,setShowSkill]);

  // Main action handler
  const handleAction=useCallback(async(action,spellId,targetEnemyIdx)=>{
    if(busy||activePIdx<0||!activeM||activeM.hp<=0) return;
    setBusy(true);setSpellMenu(false);gac();

    let nParty=[...party];
    let nEnemies=[...enemies];
    const pIdx=activePIdx;
    const member={...nParty[pIdx]};

    // Stun check
    if(member.status==='stun'){
      const mname=member.isMonster?member.name:CLASSES[member.classId].name;
      addLog('💫 '+mname+'はスタン中！動けない！');
      SFX.stun();
      nParty[pIdx]={...member,statusTurns:Math.max(0,member.statusTurns-1),status:member.statusTurns<=1?null:member.status};
      setParty(nParty);
      setPhase(nextPhase(phase,nParty,false));
      setBusy(false);return;
    }

    if(action==='spell'&&spellId){
      const allSpells=getMemberSpells(member);
      const sp=allSpells.find(s=>s.id===spellId);
      if(sp){
        const result=await executeSpell(sp,pIdx,nParty,nEnemies);
        if(!result){setBusy(false);return;}
        nParty=result.party;nEnemies=result.enemies;
      }
    }
    else if(action==='atk'){
      const ti=targetEnemyIdx!==undefined?targetEnemyIdx:nEnemies.findIndex(e=>e.hp>0);
      if(ti<0){setBusy(false);return;}
      const en=nEnemies[ti];
      const effAtk=Math.floor(member.atk*(member.atkBuffMult||1));
      let dmg=calcDamage(effAtk,en.def);
      const crit=Math.random()<0.11;
      if(crit){dmg=Math.floor(dmg*1.7);addLog('💥 会心の一撃！');}
      dmg=Math.max(1,dmg);
      const xp=60+ti*(-12);
      setPAnim(pIdx,'atk');SFX.atk();
      await sleep(250);setPAnim(pIdx,'idle');
      setMAnim(ti,'hurt');SFX.hit();addSpark(xp+'%','28%');addDmg(dmg,'e',xp+'%','16%');
      const mname=member.isMonster?member.name:CLASSES[member.classId].name;
      addLog('⚔️ '+mname+'の攻撃！'+dmg+'ダメージ！');
      nEnemies[ti]={...en,hp:Math.max(0,en.hp-dmg)};
      await sleep(300);setMAnim(ti,'idle');
    }
    else if(action==='defend'){
      nParty[pIdx]={...member,defending:true,defBuffMult:2.2,defBuffTurns:1};
      const mname=member.isMonster?member.name:CLASSES[member.classId].name;
      addLog('🛡️ '+mname+'は防御態勢をとった！（このターンダメージ55%減）');
      SFX.buff();
    }
    else if(action==='heal'){
      const cureIdx=inv.findIndex(i=>i.eff&&i.eff.cure);
      const healIdx=inv.findIndex(i=>i.eff&&i.eff.hp&&!i.eff.cure);
      const mpIdx=inv.findIndex(i=>i.eff&&i.eff.mp&&!i.eff.hp);
      let used=false;
      if(member.status&&cureIdx>=0){
        const it=inv[cureIdx];const ni=[...inv];ni.splice(cureIdx,1);
        setInv(ni);nParty[pIdx]={...member,status:null,statusTurns:0};
        addLog(it.emoji+' '+it.name+'！状態異常を回復！');SFX.heal();used=true;
      } else if(member.hp<member.maxHp&&healIdx>=0){
        const it=inv[healIdx];const ni=[...inv];ni.splice(healIdx,1);
        setInv(ni);
        // strictly cap at maxHp
        const add=Math.min(it.eff.hp, member.maxHp-member.hp);
        const newHp=Math.min(member.maxHp, member.hp+it.eff.hp);
        nParty[pIdx]={...member,hp:newHp};
        addDmg(add,'h','12%','22%');
        addLog(it.emoji+' '+it.name+'！HP+'+add+'（最大'+member.maxHp+'まで）');SFX.heal();used=true;
      } else if(member.mp<member.maxMp&&mpIdx>=0){
        const it=inv[mpIdx];const ni=[...inv];ni.splice(mpIdx,1);
        setInv(ni);
        const addMp=Math.min(it.eff.mp,member.maxMp-member.mp);
        nParty[pIdx]={...member,mp:Math.min(member.maxMp,member.mp+it.eff.mp)};
        addLog(it.emoji+' '+it.name+'！MP+'+addMp);used=true;
      }
      if(!used){addLog('使えるアイテムがない！');setBusy(false);return;}
    }
    else if(action==='flee'){
      if(Math.random()>0.42){SFX.flee();addLog('🏃 逃げ出した！');setParty(nParty);setScr('map');bgm('field');setBusy(false);return;}
      const fen=nEnemies.find(e=>e.hp>0);
      if(fen){
        const dmg=Math.max(1,fen.atk-member.def+Math.floor(Math.random()*5)-2);
        nParty[pIdx]={...member,hp:Math.max(0,member.hp-dmg)};
        setPAnim(pIdx,'hurt');SFX.phit();addDmg(dmg,'p','12%','24%');
        addLog('❌ 逃げられなかった！'+dmg+'ダメージ！');
        await sleep(380);setPAnim(pIdx,'idle');
      }
    }

    setParty(nParty);setEnemies(nEnemies);

    // Check party dead
    if(nParty.every(m=>m.hp<=0)){stopBgm();SFX.dead();setScr('gameover');setBusy(false);return;}

    // Check all enemies dead → victory
    if(nEnemies.every(e=>e.hp<=0)){
      SFX.victory();
      const totalExp=nEnemies.reduce((s,e)=>s+e.exp,0);
      const totalGold=nEnemies.reduce((s,e)=>s+e.gold,0);
      addLog('🎉 勝利！EXP+'+totalExp+' Gold+'+totalGold);
      let finalParty=nParty.map(m=>m.hp>0?doLevelUp(m,totalExp,addLog):m);
      // Reset skill used flags
      finalParty=finalParty.map(m=>({...m,baseSkillUsed:false,allySkillUsed:false}));
      setParty(finalParty);
      setGold(g=>g+totalGold);
      await sleep(800);

      // Recruit check (non-boss only)
      const isBoss=nEnemies.some(e=>e.boss);
      if(!isBoss){
        const recruitable=nEnemies.filter(e=>e.recruitable);
        const monsterCount=finalParty.filter(m=>m.isMonster).length;
        if(recruitable.length>0&&monsterCount<2&&finalParty.length<4&&Math.random()<0.3){
          const tpl=recruitable[Math.floor(Math.random()*recruitable.length)];
          setRecruitOffer(tpl);
          setBusy(false);return;
        }
      }

      // Advance encounter
      const newEncK=encK+1;
      let newStIdx=stIdx;
      if(encK>=3){
        if(stIdx>=3){stopBgm();setScr('clear');setBusy(false);return;}
        newStIdx=stIdx+1;setEncK(0);setStIdx(newStIdx);
        addLog('🚪 '+STAGES[newStIdx].name+'へ進んだ！');
      } else {
        setEncK(newEncK);
      }
      setScr('map');bgm('field');setBusy(false);return;
    }

    // Next player turn
    const np=nextPhase(phase,nParty,false);
    if(np==='enemy'){
      setPhase('enemy');
      await sleep(280);
      // Enemy turn
      let ep=[...nParty];let ee=[...nEnemies];
      const liveEns=ee.filter(e=>e.hp>0);
      for(let ei=0;ei<liveEns.length;ei++){
        const en=liveEns[ei];
        const enIdx=ee.indexOf(en);
        if(en.status==='stun'){addLog('💫 '+en.name+'はスタン中！');continue;}

        // Phase check
        const phaseData=(en.phases||[]).find(ph=>en.hp/en.maxHp<=ph.hp&&enIdx===0);
        if(phaseData&&(en.currentPhase||0)<(en.phases||[]).indexOf(phaseData)+1){
          ee[enIdx]={...en,currentPhase:(en.currentPhase||0)+1,atkBonus:(en.atkBonus||0)+(phaseData.atkBonus||0),matBonus:(en.matBonus||0)+(phaseData.matBonus||0),rageAoe:phaseData.aoe||false,tripleAtk:phaseData.tripleAttack||false};
          addLog('💢 '+en.name+'！'+phaseData.msg);SFX.rage();
          await sleep(500);
        }

        const attacks=ee[enIdx].tripleAtk?3:ee[enIdx].doubleAttack?2:1;
        for(let ai=0;ai<attacks;ai++){
          if(ee[enIdx].rageAoe){
            // AOE attack
            const aoeBase=Math.floor(ee[enIdx].atk*(0.5+(ai*0.1)))+(ee[enIdx].atkBonus||0);
            for(let pi=0;pi<ep.length;pi++){
              if(ep[pi].hp<=0) continue;
              const effDef=Math.floor(ep[pi].def*(ep[pi].defBuffMult||1));
              const dmg=Math.max(1,aoeBase-effDef+Math.floor(Math.random()*6)-3);
              ep[pi]={...ep[pi],hp:Math.max(0,ep[pi].hp-dmg)};
              setPAnim(pi,'hurt');SFX.phit();addDmg(dmg,'p',(pi*22+5)+'%','48%');
            }
            addLog('💥 '+ee[enIdx].name+'の全体攻撃！全員にダメージ！');
            await sleep(400);
          } else {
            // Single target: lowest HP alive
            const alive=ep.filter(m=>m.hp>0);
            if(alive.length===0) break;
            const tgt=alive.reduce((a,b)=>a.hp<b.hp?a:b);
            const ti=ep.indexOf(tgt);
            const effDef=Math.floor(tgt.def*(tgt.defBuffMult||1));
            const eatk=(ee[enIdx].atk||30)+(ee[enIdx].atkBonus||0);
            let dmg=calcDamage(eatk,effDef);

            // Reflect check
            if(tgt.reflecting){
              addLog('💠 魔法が反射された！'+ee[enIdx].name+'にダメージ！');
              ee[enIdx]={...ee[enIdx],hp:Math.max(0,ee[enIdx].hp-dmg)};
              ep[ti]={...tgt,reflecting:false};
              continue;
            }

            setPAnim(ti,'hurt');setMAnim(enIdx,'atk');SFX.phit();
            addSpark((ti*22+5)+'%','50%');addDmg(dmg,'p',(ti*22+5)+'%','44%');
            addLog('💢 '+ee[enIdx].name+'が'+((tgt.isMonster?tgt.name:CLASSES[tgt.classId]?.name)||'?')+'に'+dmg+'ダメージ！');
            ep[ti]={...tgt,hp:Math.max(0,tgt.hp-dmg)};

            // Status inflict
            if(ee[enIdx].si&&!tgt.status&&Math.random()<0.22){
              ep[ti]={...ep[ti],status:ee[enIdx].si,statusTurns:3};
              const siLabel=ee[enIdx].si==='poison'?'☠️毒':ee[enIdx].si==='burn'?'🔥燃焼':'💫スタン';
              addLog(siLabel+'！');
            }
            await sleep(330);setPAnim(ti,'idle');setMAnim(enIdx,'idle');
            await sleep(80);
          }
        }

        // Enemy DoT
        const enDot=processStatusDot(ee[enIdx]);
        if(enDot.hp<ee[enIdx].hp){addDmg(ee[enIdx].hp-enDot.hp,'e',(60+enIdx*(-12))+'%','16%');SFX.poison();}
        ee[enIdx]=enDot;
      }

      // Party DoT
      ep=ep.map((m,i)=>{
        if(m.hp<=0||!m.status) return m;
        const pm=processStatusDot(m);
        if(pm.hp<m.hp) addDmg(m.hp-pm.hp,'p',(i*22+5)+'%','46%');
        return pm;
      });

      // Decrement buffs
      ep=ep.map(m=>decrementBuffs(m));

      setParty(ep);setEnemies(ee);

      if(ep.every(m=>m.hp<=0)){stopBgm();SFX.dead();setScr('gameover');setBusy(false);return;}
      if(ee.every(e=>e.hp<=0)){
        // Victory (same as above - call nextEnemy handling)
        setBusy(false);
        // Trigger win: re-handle

      setPhase(np);

      const offSpells=spells.filter(sp=>sp&&(sp.type==='atk_all'||sp.type==='atk_one')&&member.mp>=(sp.mp||0));

              return(
                <div key={i}>
                  <HpBar hp={m.hp} maxHp={m.maxHp} label={mname+' Lv.'+m.level+(m.status?' ['+m.status+']':'')+(bStr.length>0?' ✨'+bStr.join('/'):'')} color={mc} small/>
                  <div style={{display:'flex',gap:'4px',marginBottom:'3px',alignItems:'center',fontSize:'.68rem',color:'#374151'}}>
                    <span>MP:{m.mp}/{m.maxMp}</span><MpBar mp={m.mp} maxMp={m.maxMp}/>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Actions */}
          <div className="card" style={{borderColor:'rgba(212,160,23,.1)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <div style={{fontSize:'.82rem',fontWeight:900,color:activeM?(activeM.isMonster?'#4ade80':CLASSES[activeM.classId].color):'#374151'}}>
                {phase==='enemy'?'💢 敵のターン…':activeM?(activeM.isMonster?'👾 '+activeM.name:'⚔️ '+CLASSES[activeM.classId].name)+'のターン！':''}
              </div>
              <button onClick={()=>setAutoMode(v=>!v)} style={{background:autoMode?'rgba(34,197,94,.22)':'rgba(80,80,90,.18)',border:'1px solid '+(autoMode?'#22c55e':'#1e1e3a'),color:autoMode?'#22c55e':'#374151',padding:'4px 12px',borderRadius:'16px',fontSize:'.75rem',fontWeight:900,cursor:'pointer'}}>
                {autoMode?'AUTO●':'AUTO○'}
              </button>
            </div>

            {!spellMenu&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
                {[
                  {l:'⚔️ こうげき',s:'通常攻撃',c:'#dc2626',dis:busy||autoMode||phase==='enemy',fn:()=>handleAction('atk',null,null)},
                  {l:'✨ 呪文',s:activeM?activeMemberSpells.length+'個使用可':'',c:'#8b5cf6',dis:busy||autoMode||phase==='enemy'||activeMemberSpells.length===0,fn:()=>setSpellMenu(true)},
                  {l:'🌿 アイテム',s:inv.length+'個所持',c:'#16a34a',dis:busy||autoMode||inv.length===0||phase==='enemy',fn:()=>handleAction('heal',null,null)},
                  {l:'🛡️ 防御',s:'ダメージ55%減',c:'#0ea5e9',dis:busy||autoMode||phase==='enemy',fn:()=>handleAction('defend',null,null)},
                  {l:'🏃 にげる',s:'60%成功',c:'#4b5563',dis:busy||autoMode||phase==='enemy',fn:()=>handleAction('flee',null,null)},
                ].map(b=>(
                  <button key={b.l} disabled={b.dis} onClick={b.fn}
                    style={{...bs(b.c,b.dis),margin:0,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',padding:'11px 6px',gridColumn:b.l==='🏃 にげる'?'1/-1':undefined}}>
                    <span style={{fontSize:'.9rem'}}>{b.l}</span>
                    <span style={{fontSize:'.62rem',opacity:.72,fontWeight:'normal'}}>{b.s}</span>
                  </button>
                ))}
              </div>
            )}

            {/* Spell submenu */}
            {spellMenu&&activeM&&(
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'7px'}}>
                  <span style={{fontSize:'.82rem',fontWeight:900,color:'#a78bfa'}}>✨ 呪文を選べ</span>
                  <button onClick={()=>setSpellMenu(false)} style={{background:'transparent',border:'1px solid #2a2a4a',color:'#64748b',padding:'3px 8px',borderRadius:'8px',fontSize:'.75rem',cursor:'pointer'}}>← もどる</button>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px',maxHeight:'210px',overflowY:'auto'}}>
                  {activeMemberSpells.map((sp,i)=>{
                    const noMp=activeM.mp<sp.mp;
                    const used=(sp.id===CLASSES[activeM.classId]?.baseSkill?.id&&activeM.baseSkillUsed)||(activeM.isMonster&&activeM.allySkillUsed&&i===0);
                    const dis=busy||noMp||used;
                    return(
                      <button key={sp.id||i} disabled={dis} onClick={()=>{setSpellMenu(false);handleAction('spell',sp.id,null);}}
                        style={{...bs(sp.color||'#8b5cf6',dis),margin:0,display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',padding:'9px 5px',fontSize:'.78rem'}}>
                        <span>{sp.e} {sp.name}</span>
                        <span style={{fontSize:'.62rem',opacity:.7,fontWeight:'normal'}}>MP:{sp.mp} {sp.desc}</span>
                        {used&&<span style={{fontSize:'.58rem',color:'#374151'}}>使用済み</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </>
      )}

      {/* SHOP */}
      {scr==='shop'&&party.length>0&&(
        <div className="card" style={{animation:'fadeIn .3s ease',borderColor:'rgba(212,160,23,.16)'}}>
          <div style={{color:'#d4a017',fontWeight:900,textAlign:'center',marginBottom:'8px'}}>🛒 ショップ　Gold: {gold}</div>
          <div style={{fontSize:'.68rem',color:'#374151',textAlign:'center',marginBottom:'8px'}}>装備は全員に適用 / 消耗品はスタックに追加（最大5個）</div>
          {ITEMS.map(item=>(
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'6px',padding:'8px',background:'rgba(255,255,255,.025)',borderRadius:'9px'}}>
              <span style={{fontSize:'1.3rem'}}>{item.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'.82rem',fontWeight:'bold'}}>{item.name}</div>
                <div style={{fontSize:'.68rem',color:'#4b5563'}}>{item.desc}</div>
              </div>
              <button onClick={()=>buyItem(item)} disabled={gold<item.cost} style={{...bs('#d97706',gold<item.cost),margin:0,padding:'7px 10px',fontSize:'.78rem'}}>{item.cost}G</button>
            </div>
          ))}
          {/* Use consumables from map */}
          {inv.length>0&&(
            <div style={{borderTop:'1px solid rgba(255,255,255,.05)',paddingTop:'8px',marginTop:'4px'}}>
              <div style={{color:'#64748b',fontSize:'.7rem',marginBottom:'5px'}}>在庫アイテムを使う：</div>
              <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                {party.map((m,i)=>{
                  const mc=m.isMonster?'#4ade80':CLASSES[m.classId].color;
                  const mname=m.isMonster?m.name:CLASSES[m.classId].name;
                  return(
                    <button key={i} disabled={m.hp<=0} onClick={()=>{
                      const hi=inv.findIndex(it=>it.eff&&it.eff.hp&&!it.eff.cure);
                      const ci=inv.findIndex(it=>it.eff&&it.eff.cure);
                      if(m.status&&ci>=0){
                        const it=inv[ci];const ni=[...inv];ni.splice(ci,1);setInv(ni);
                        setParty(p=>{const n=[...p];n[i]={...n[i],status:null,statusTurns:0};return n;});
                        SFX.heal();addLog(it.emoji+' '+mname+'の状態異常回復！');
                      } else if(m.hp<m.maxHp&&hi>=0){
                        const it=inv[hi];const ni=[...inv];ni.splice(hi,1);setInv(ni);
                        const add=Math.min(it.eff.hp,m.maxHp-m.hp);
                        setParty(p=>{const n=[...p];n[i]={...n[i],hp:Math.min(n[i].maxHp,n[i].hp+it.eff.hp)};return n;});
                        SFX.heal();addLog(it.emoji+' '+mname+' HP+'+add);
                      } else {addLog(mname+'に使えるアイテムなし！');}
                    }} style={{...bs(mc,m.hp<=0),margin:0,padding:'7px 10px',fontSize:'.78rem'}}>
                      {mname}に使う
                    </button>
                  );
                })}
              </div>
            </div>
          )}
          <div style={{textAlign:'center',marginTop:'10px'}}>
            <button style={bs('#374151')} onClick={()=>{SFX.cursor();setScr('map');}}>🔙 もどる</button>
          </div>
        </div>
      )}

      {/* GAME OVER */}
      {scr==='gameover'&&(
        <div className="card" style={{textAlign:'center',animation:'popIn .5s ease',borderColor:'rgba(220,38,38,.3)'}}>
          <div style={{fontSize:'4rem',marginBottom:'7px'}}>💀</div>
          <div style={{color:'#dc2626',fontSize:'1.5rem',fontWeight:900,letterSpacing:'.08em',marginBottom:'4px'}}>GAME OVER</div>
          <div style={{color:'#4b5563',marginBottom:'12px',fontSize:'.85rem'}}>パーティは全滅した… / {STAGES[stIdx].name}</div>
          <button style={bs('#dc2626')} onClick={restart}>🔄 もういちど</button>
        </div>
      )}

      {/* CLEAR */}
      {scr==='clear'&&(
        <div className="card" style={{textAlign:'center',animation:'popIn .5s ease',borderColor:'rgba(212,160,23,.4)'}}>
          <div style={{fontSize:'4rem',marginBottom:'7px',animation:'winSpin .8s ease-in-out infinite'}}>🏆</div>
          <div style={{color:'#d4a017',fontSize:'1.4rem',fontWeight:900,marginBottom:'6px'}}>🎉 全ステージクリア！ 🎉</div>
          <div style={{color:'#a3e635',marginBottom:'4px'}}>魔天王ゼロスを討伐した！</div>
          <div style={{color:'#4b5563',fontSize:'.78rem',marginBottom:'14px'}}>
            {party.map(m=>(m.isMonster?m.name:CLASSES[m.classId].name)+' Lv.'+m.level).join(' / ')}
          </div>
          <button style={bs('#d4a017')} onClick={restart}>🔄 もういちど</button>
        </div>
      )}

      {/* LOG */}
      {scr!=='title'&&scr!=='select'&&(
        <div className="card" style={{maxHeight:'130px',overflowY:'auto',borderColor:'rgba(255,255,255,.04)'}}>
          {log.map((e,i)=>(
            <div key={i} style={{padding:'2px 0',fontSize:'.76rem',lineHeight:1.5,borderBottom:'1px solid rgba(255,255,255,.04)',opacity:1-i*.07,color:i===0?'#c8d4e8':'#374151'}}>{e}</div>
          ))}
        </div>
      )}

      {/* iOS hint */}
      <div id="iosH" style={{display:'none',position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(135deg,#0a0920,#14114a)',borderTop:'1px solid #d4a01744',padding:'11px',zIndex:9999,alignItems:'center',gap:'10px'}}>
        <div style={{flex:1,fontSize:'.78rem',color:'#dde4f0'}}>📱 Safari → 共有(□↑) →「ホーム画面に追加」でアプリになるよ！</div>
        <button onClick={()=>document.getElementById('iosH').style.display='none'} style={{background:'transparent',border:'none',color:'#374151',fontSize:'1.2rem',cursor:'pointer'}}>✕</button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isSA=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
if(isIOS&&!isSA)setTimeout(()=>{const b=document.getElementById('iosH');if(b)b.style.display='flex';},7000);
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
