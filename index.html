};
function bgm(name){if(_bcur===name)return;stopBgm();_bcur=name;_bgmLoop(name);}
function _bgmLoop(name){if(_bcur!==name||_muted)return;const b=BGMS[name];if(!b)return;try{const c=gac();let t=c.currentTime+0.05;const bd=60/b.bpm;b.s.forEach(([f,beats])=>{tn(f,t,beats*bd*0.86);t+=beats*bd;});_btid=setTimeout(()=>_bgmLoop(name),(t-c.currentTime)*1000-100);}catch(e){}}
function stopBgm(){_bcur=null;if(_btid)clearTimeout(_btid);_btid=null;}
function toggleMute(){_muted=!_muted;if(_muted)stopBgm();return _muted;}
const SFX={
  atk(){const c=gac(),t=c.currentTime;tn(220,t,.1,.45,'sawtooth');tn(180,t+.05,.15,.22,'square');},

  magic(){const c=gac(),t=c.currentTime;[523,659,784,1047].forEach((f,i)=>tn(f,t+i*.06,.22,.24,'sine'));tn(1319,t+.3,.3,.16,'triangle');},

  win(){const c=gac(),t=c.currentTime;[523,659,784,1047,1319,1568].forEach((f,i)=>tn(f,t+i*.11,.4,.28,'triangle'));},
  dead(){const c=gac(),t=c.currentTime;[440,330,220,110].forEach((f,i)=>tn(f,t+i*.16,.45,.24,'sawtooth'));},
  cursor(){tn(660,gac().currentTime,.08,.22,'sine');},
  flee(){const c=gac(),t=c.currentTime;[300,200,150].forEach((f,i)=>tn(f,t+i*.07,.22,.22,'sawtooth'));},
  buy(){const c=gac(),t=c.currentTime;tn(880,t,.15,.3,'sine');tn(1100,t+.11,.15,.22,'sine');},
  save(){const c=gac(),t=c.currentTime;[440,550,660].forEach((f,i)=>tn(f,t+i*.07,.2,.22,'sine'));},
  poison(){const c=gac(),t=c.currentTime;tn(300,t,.2,.15,'sawtooth');tn(250,t+.1,.2,.12,'sawtooth');},
  stun(){const c=gac(),t=c.currentTime;tn(200,t,.25,.18,'square');},
};

  {name:'虚無の玉座',emoji:'🌌',sky:'linear-gradient(180deg,#020208,#040412,#020208)',gnd:'rgba(70,15,115,0.4)',gb:'rgba(120,35,195,0.55)',bgm:'boss'},

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// ===== COMPONENTS =====
function HpBar({hp,maxHp,label,color,small}){
  const pct=Math.max(0,(hp/maxHp)*100);
  const col=pct>50?'#22c55e':pct>25?'#facc15':'#ef4444';
  return(
    <div style={{marginBottom:small?'3px':'6px'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:small?'0.72rem':'0.8rem',marginBottom:'2px'}}>
        <span style={{color,fontWeight:900}}>{label}</span>
        <span style={{color:'#64748b'}}>{Math.max(0,Math.round(hp))}/{maxHp}</span>
      </div>
      <div className="hpt"><div className="hpf" style={{width:pct+'%',background:`linear-gradient(90deg,${col},${col}99)`,boxShadow:`0 0 5px ${col}77`}}/></div>
    </div>
  );
}
function MpBar({mp,maxMp,small}){
  const pct=Math.max(0,(mp/maxMp)*100);
  return(
    <div className="mpt"><div className="mpf" style={{width:pct+'%'}}/></div>
  );
}
function ExpBar({exp,level}){
  const prev=level<=1?0:calcNext(level-1);
  const next=calcNext(level);
  const cur=exp-prev, need=next-prev;
  const pct=Math.min(100,(cur/need)*100);
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.68rem',color:'#5a5af0',marginBottom:'2px'}}>
        <span>EXP</span><span>{cur}/{need}（次まで{need-cur}）</span>
      </div>
      <div className="expt"><div className="expf" style={{width:pct+'%'}}/></div>
    </div>
  );
}

// Character sprite - layered emoji
function CharSprite({classId,status,hp,maxHp,anim,size=3.4}){
  const cls=CLASSES[classId];
  const alive=hp>0;
  const crit=hp/maxHp<0.25;
  const statusColor=status==='poison'?'#a855f7':status==='burn'?'#ef4444':status==='stun'?'#fbbf24':'transparent';
  const filter=!alive?'grayscale(1) opacity(0.25)':
    status==='poison'?`drop-shadow(0 0 8px #a855f7) hue-rotate(75deg)`:
    status==='burn'?`drop-shadow(0 0 10px #ef4444)`:
    status==='stun'?`drop-shadow(0 0 8px #fbbf24)`:
    crit?`drop-shadow(0 0 10px #ef444477)`:
    `drop-shadow(0 0 8px ${cls.color}66)`;
  const mainAnim=!alive?'none':anim==='atk'?'charAtk 0.4s ease':anim==='hurt'?'shakeX 0.35s ease':anim==='skill'?'winSpin 0.5s ease':crit?'blink 0.7s ease-in-out infinite':'floatSlow 3s ease-in-out infinite';
  return(
    <div style={{position:'relative',display:'inline-flex',flexDirection:'column',alignItems:'center',gap:'2px',minWidth:`${size+0.8}rem`}}>
      {status&&<div style={{position:'absolute',top:'-10px',right:'-6px',fontSize:'0.65rem',zIndex:10}}>{status==='poison'?'☠️':status==='burn'?'🔥':status==='stun'?'💫':''}</div>}
      <div style={{position:'relative',fontSize:`${size}rem`,lineHeight:1,filter,animation:mainAnim,transformOrigin:'bottom center'}}>
        {cls.cEmoji}
        <span style={{position:'absolute',bottom:'-6px',right:'-10px',fontSize:`${size*0.36}rem`}}>{cls.wEmoji}</span>
        <span style={{position:'absolute',top:'-8px',left:'50%',transform:'translateX(-50%)',fontSize:`${size*0.3}rem`}}>{cls.bEmoji}</span>
      </div>
      <div style={{fontSize:'0.62rem',color:cls.color,fontWeight:900,textAlign:'center',lineHeight:1}}>{cls.name}</div>
    </div>
  );
}

// Monster sprite
function MonSprite({mon,anim,size=5}){
  const alive=mon.hp>0;
  const filter=!alive?'grayscale(1) opacity(0) transition: opacity 0.5s':(mon.flt||'none');
  const glowColor=mon.gc||'#888';
  const baseFilter=!alive?'grayscale(1) opacity(0)':
    anim==='hurt'?`${mon.flt||''} drop-shadow(0 0 20px rgba(255,50,0,1)) brightness(1.6)`:
    `${mon.flt||''} drop-shadow(0 0 10px ${glowColor}99)`;
  const mainAnim=!alive?'none':anim==='hurt'?'shakeX 0.42s ease':anim==='atk'?'monAtk 0.4s ease':'float 2.8s ease-in-out infinite';
  return(
    <div style={{position:'relative',display:'inline-block',transition:'opacity 0.5s',opacity:alive?1:0}}>
      <span style={{fontSize:`${size}rem`,lineHeight:1,display:'block',filter:baseFilter,animation:mainAnim,transformOrigin:'bottom center'}}>{mon.base}</span>
      {mon.ov&&<span style={{position:'absolute',top:'-10px',right:'-8px',fontSize:`${size*0.34}rem`,pointerEvents:'none'}}>{mon.ov}</span>}
    </div>
  );
}

function initMember(classId){
  const c=CLASSES[classId];
  return{classId,...c,hp:c.hp,maxHp:c.hp,mp:c.mp,maxMp:c.mp,level:1,exp:0,status:null,statusTurns:0,skillUsed:false,atk:c.atk,def:c.def,mat:c.mat};
}
function initEnemy(mon){return{...mon,hp:mon.maxHp,status:null,statusTurns:0};}

function App(){
  const [scr,setScr]=useState('title');
  const [party,setParty]=useState([]);
  const [enemies,setEnemies]=useState([]);
  const [selClasses,setSelClasses]=useState([]);
  const [stageIdx,setStageIdx]=useState(0);
  const [encKills,setEncKills]=useState(0);
  const [inventory,setInventory]=useState([]);
  const [sharedGold,setSharedGold]=useState(250);
  const [log,setLog]=useState([]);
  const [busy,setBusy]=useState(false);
  const [turnPhase,setTurnPhase]=useState('p0'); // p0,p1,enemy
  const [pAnims,setPAnims]=useState(['idle','idle']);
  const [mAnims,setMAnims]=useState(['idle','idle','idle']);
  const [showSkill,setShowSkill]=useState(null); // null or classId
  const [dmgs,setDmgs]=useState([]);
  const [sparks,setSparks]=useState([]);
  const [autoMode,setAutoMode]=useState(false);
  const [isMuted,setIsMuted]=useState(false);
  const [saveMsg,setSaveMsg]=useState('');
  const [shopTarget,setShopTarget]=useState(0); // which party member to buy consumable for
  const uid=useRef(0);
  const autoRef=useRef(autoMode);
  useEffect(()=>{autoRef.current=autoMode;},[autoMode]);

  const addLog=m=>setLog(p=>[m,...p].slice(0,12));
  const addDmg=(v,type,pos)=>{const id=uid.current++;setDmgs(p=>[...p,{id,v,type,pos}]);setTimeout(()=>setDmgs(p=>p.filter(d=>d.id!==id)),950);};
  const addSpark=(x,y)=>{const id=uid.current++;setSparks(p=>[...p,{id,x,y}]);setTimeout(()=>setSparks(p=>p.filter(s=>s.id!==id)),700);};
  const setPAnim=(idx,a)=>setPAnims(prev=>{const n=[...prev];n[idx]=a;return n;});
  const setMAnim=(idx,a)=>setMAnims(prev=>{const n=[...prev];n[idx]=a;return n;});

  // Start battle
  const startBattle=useCallback((partyState,stIdx,ekills)=>{
    const stg=stIdx??stageIdx;
    const ek=ekills??encKills;
    const encGroup=ENC[stg][Math.min(ek,3)];
    const ens=encGroup.map(m=>initEnemy(m));
    const isBoss=ek>=3;
    setEnemies(ens);
    setMAnims(new Array(ens.length).fill('idle'));
    setTurnPhase('p0');
    setBusy(false);
    setShowSkill(null);
    setScr('battle');
    if(partyState)setParty(partyState);
    addLog(`⚠️ ${ens.map(e=>e.name).join(' & ')}が現れた！${isBoss?'🚨 ボスだ！':''}`);
    const bgmKey=isBoss&&stg>=3?'boss':isBoss?'boss':stg===0?'battle':'battle';
    bgm(bgmKey);
  },[stageIdx,encKills]);

  // AI decision (fixed: attack-first)
  const aiDecide=(member,ens,inv)=>{
    const hpR=member.hp/member.maxHp;
    const hasHeal=inv.some(i=>i.effect?.hp&&i.per==='member');
    const liveEns=ens.filter(e=>e.hp>0);
    if(liveEns.length===0)return{action:'wait'};
    // Only heal when critically low AND have item AND high chance
    if(hpR<0.2&&hasHeal&&Math.random()<0.65)return{action:'heal'};
    // Use skill if available and enemy is tough
    const cls=CLASSES[member.classId];
    if(!member.skillUsed&&member.mp>=cls.skill.mp)return{action:'skill',target:0};
    // Default: attack
    return{action:'atk',target:ens.findIndex(e=>e.hp>0)};
  };

  // Apply status to enemy
  const tryInflict=(enemy,statusId,rate=0.32)=>{
    if(!statusId||enemy.status||Math.random()>rate)return enemy;
    return{...enemy,status:statusId,statusTurns:3};
  };

  // Process status effect
  const processStatus=(entity)=>{
    if(!entity.status||entity.statusTurns<=0)return{...entity,status:null,statusTurns:0};
    let hp=entity.hp;
    if(entity.status==='poison'){hp=Math.max(1,hp-Math.floor(entity.maxHp*0.1));SFX.poison();}
    if(entity.status==='burn'){hp=Math.max(1,hp-Math.floor(entity.maxHp*0.08));SFX.poison();}
    return{...entity,hp,statusTurns:entity.statusTurns-1,status:entity.statusTurns<=1?null:entity.status};
  };

  // Level up check
  const doLevelUp=(member)=>{
    let m={...member};
    while(m.exp>=calcNext(m.level)){
      m={...m,level:m.level+1,maxHp:m.maxHp+25,hp:m.maxHp+25,maxMp:m.maxMp+9,mp:m.maxMp+9,atk:m.atk+5,def:m.def+3,mat:m.mat+5,skillUsed:false};
      SFX.lvup();addLog(`🌟 ${CLASSES[m.classId].name}がLv.${m.level}になった！HP・MP全回復！`);
    }
    return m;
  };

  // Execute one party member action
  const executeAction=useCallback(async(pIdx,action,targetEnemyIdx,currentParty,currentEnemies,currentInv)=>{
    const member={...currentParty[pIdx]};
    const cls=CLASSES[member.classId];
    let newParty=[...currentParty];
    let newEnemies=[...currentEnemies];
    let newInv=[...currentInv];

    if(member.hp<=0){return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};}
    if(member.status==='stun'){
      addLog(`💫 ${cls.name}はスタンして動けない！`);SFX.stun();
      newParty[pIdx]={...member,status:member.statusTurns<=1?null:member.status,statusTurns:Math.max(0,member.statusTurns-1)};
      return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};
    }

    if(action==='heal'){
      const idx=newInv.findIndex(i=>i.effect?.hp&&i.per==='member');
      if(idx===-1){addLog('アイテムがない！');return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};}
      const item=newInv[idx];newInv.splice(idx,1);
      // FIXED: cap at maxHp, never increase maxHp
      const add=Math.min(item.effect.hp, member.maxHp-member.hp);
      const newHp=Math.min(member.maxHp, member.hp+item.effect.hp);
      const newMp=item.effect.mp?Math.min(member.maxMp,member.mp+(item.effect.mp||0)):member.mp;
      newParty[pIdx]={...member,hp:newHp,mp:newMp};
      SFX.heal();addDmg(add,'h',`${pIdx*22+5}%`);
      addLog(`${item.emoji} ${cls.name}が${item.name}を使った！HP+${add}`);
      return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};
    }

    if(action==='flee'){
      if(Math.random()>0.42){SFX.flee();addLog('🏃 パーティは逃げ出した！');return{party:newParty,enemies:newEnemies,inv:newInv,fled:true,dead:false,won:false};}
      // Failed flee - take damage from first enemy
      const fen=newEnemies.find(e=>e.hp>0);
      if(fen){
        const dmg=Math.max(1,fen.atk-member.def+Math.floor(Math.random()*4)-2);
        newParty[pIdx]={...member,hp:member.hp-dmg};
        SFX.phit();addDmg(dmg,'p',`${pIdx*22+5}%`);setPAnim(pIdx,'hurt');
        addLog(`❌ 逃げられなかった！${cls.name}が${dmg}ダメージ！`);
        await sleep(380);setPAnim(pIdx,'idle');
        if(newParty[pIdx].hp<=0){newParty[pIdx]={...newParty[pIdx],hp:0};}
      }
      return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};
    }

    // Attack or skill
    const isSkill=action==='skill';
    if(isSkill&&member.mp<cls.skill.mp){addLog(`MPが足りない！(必要${cls.skill.mp}MP)`);return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};}

    // Special: priest heal all
    if(isSkill&&cls.skill.type==='heal_all'){
      setPAnim(pIdx,'skill');setShowSkill(cls.id);SFX.healAll();
      await sleep(300);setShowSkill(null);setPAnim(pIdx,'idle');
      newParty=newParty.map(m=>m.hp>0?{...m,hp:m.maxHp,mp:Math.min(m.maxMp,m.mp+5),status:null,statusTurns:0}:m);
      newParty[pIdx]={...newParty[pIdx],mp:member.mp-cls.skill.mp,skillUsed:true};
      newParty.forEach((_,i)=>addDmg('全回復','h',`${i*22+5}%`));
      addLog(`✨ ${cls.skill.name}！パーティ全員が完全回復した！`);
      return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};
    }

    // Damage action
    const isAll=isSkill&&(cls.skill.type==='atk_all');
    const targets=isAll?newEnemies.map((_,i)=>i).filter(i=>newEnemies[i].hp>0):[targetEnemyIdx];

    setPAnim(pIdx,isSkill?'skill':'atk');
    if(isSkill){setShowSkill(cls.id);SFX[cls.id==='mage'?'magic':'skill']();}else SFX.atk();
    await sleep(290);setShowSkill(null);setPAnim(pIdx,'idle');

    for(const ti of targets){
      const en=newEnemies[ti];
      if(!en||en.hp<=0)continue;
      let dmg=isSkill?cls.skill.fn(member):Math.max(1,member.atk-en.def+Math.floor(Math.random()*7)-3);
      // Critical hit 12%
      const crit=!isSkill&&Math.random()<0.12;
      if(crit){dmg=Math.floor(dmg*1.65);addLog('💥 会心の一撃！');}
      dmg=Math.max(1,dmg);

      setMAnim(ti,'hurt');SFX.hit();
      addSpark(`${62+ti*(-15)}%`,'30%');
      addDmg(dmg,'e',`${62+ti*(-15)}%`);

      let newEn={...en,hp:Math.max(0,en.hp-dmg)};
      // Try to inflict status
      if(isSkill&&cls.skill.inflict){newEn=tryInflict(newEn,cls.skill.inflict,0.42);}
      if(isSkill&&cls.skill.inflict&&newEn.status===cls.skill.inflict&&!en.status)addLog(`${cls.skill.inflict==='stun'?'💫スタン':'🔥燃焼'}付与！`);
      newEnemies[ti]=newEn;
      await sleep(200);setMAnim(ti,'idle');
    }

    const msg=isSkill
      ?`✨ ${cls.name}が${cls.skill.name}！${targets.reduce((s,i)=>s+Math.max(0,newEnemies[i].maxHp-(newEnemies[i].hp+(newEnemies[i].maxHp-newEnemies[i].maxHp))),0)||'大ダメージ'}！`
      :`⚔️ ${cls.name}が攻撃！${isAll?'全体攻撃！':''}`;
    addLog(msg.length>35?msg.slice(0,35)+'…':msg);

    newParty[pIdx]={...member,mp:isSkill?Math.max(0,member.mp-cls.skill.mp):member.mp,skillUsed:isSkill?true:member.skillUsed};

    // Check win
    const allDead=newEnemies.every(e=>e.hp<=0);
    if(allDead){
      SFX.win();
      const totalExp=newEnemies.reduce((s,e)=>s+e.exp,0);
      const totalGold=newEnemies.reduce((s,e)=>s+e.gold,0);
      addLog(`🎉 勝利！EXP+${totalExp} Gold+${totalGold}`);
      newParty=newParty.map(m=>m.hp>0?doLevelUp({...m,exp:m.exp+totalExp}):m);
      return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:true,totalGold};
    }
    return{party:newParty,enemies:newEnemies,inv:newInv,fled:false,dead:false,won:false};
  },[doLevelUp]);

  // Enemy turn
  const runEnemyTurn=useCallback(async(currentParty,currentEnemies)=>{
    let newParty=[...currentParty];
    const liveEns=currentEnemies.filter(e=>e.hp>0);

    for(let ei=0;ei<liveEns.length;ei++){
      const en=liveEns[ei];
      const enIdx=currentEnemies.indexOf(en);
      if(en.hp<=0)continue;
      if(en.status==='stun'){
        addLog(`💫 ${en.name}はスタンで動けない！`);
        continue;
      }
      // Pick target (alive party member with lowest HP)
      const alive=newParty.filter(m=>m.hp>0);
      if(alive.length===0)break;
      const target=alive.reduce((a,b)=>a.hp<b.hp?a:b);
      const ti=newParty.indexOf(target);
      const dmg=Math.max(1,en.atk-target.def+Math.floor(Math.random()*6)-3);

      setMAnim(enIdx,'atk');SFX.phit();
      addSpark(`${ti*22+5}%`,'50%');addDmg(dmg,'p',`${ti*22+5}%`);
      setPAnim(ti,'hurt');
      addLog(`💢 ${en.name}が${CLASSES[target.classId].name}に${dmg}ダメージ！`);
      newParty[ti]={...target,hp:Math.max(0,target.hp-dmg)};
      // Enemy status inflict
      if(en.si&&!target.status&&Math.random()<0.22){
        newParty[ti]={...newParty[ti],status:en.si,statusTurns:3};
        const statusLabel=en.si==='poison'?'☠️毒':en.si==='burn'?'🔥燃焼':'💫スタン';
        addLog(`${statusLabel}！${CLASSES[target.classId].name}が${en.si}状態に！`);
      }
      await sleep(380);setPAnim(ti,'idle');setMAnim(enIdx,'idle');
      await sleep(100);
    }

    // DoT on party
    newParty=newParty.map((m,i)=>{
      if(m.hp<=0||!m.status)return m;
      const pm=processStatus(m);
      if(pm.hp<m.hp)addDmg(m.hp-pm.hp,'p',`${i*22+5}%`);
      return pm;
    });

    // DoT on enemies (burn only from mage skill etc.)
    const newEnemies=currentEnemies.map((e,i)=>{
      if(e.hp<=0||!e.status)return e;
      const pe=processStatus(e);
      if(pe.hp<e.hp){addDmg(e.hp-pe.hp,'e',`${62+i*(-15)}%`);SFX.poison();}
      return pe;
    });

    const allDead=newParty.every(m=>m.hp<=0);
    return{party:newParty,enemies:newEnemies,allDead};
  },[processStatus]);

  // Main action handler
  const handleAction=useCallback(async(action,targetIdx=0)=>{
    if(busy)return;setBusy(true);gac();

    const curPIdx=turnPhase==='p0'?0:1;
    const result=await executeAction(curPIdx,action,targetIdx,party,enemies,inventory);

    if(result.fled){
      setParty(result.party);setEnemies(result.enemies);setInventory(result.inv);
      setScr('map');bgm('field');setBusy(false);return;
    }
    if(result.won){
      const newGold=sharedGold+result.totalGold;
      setSharedGold(newGold);setParty(result.party);setInventory(result.inv);
      setEnemies(result.enemies);
      await sleep(700);
      // Advance encounters
      const isBoss=encKills>=3;
      let newEncKills=encKills+1;
      let newStageIdx=stageIdx;
      if(isBoss){
        if(stageIdx>=3){stopBgm();setScr('clear');setBusy(false);return;}
        newStageIdx=stageIdx+1;newEncKills=0;
        addLog(`🚪 ${STAGES[newStageIdx].name}へ進んだ！`);
      }
      // Reset party skill usage
      const resetParty=result.party.map(m=>({...m,skillUsed:false}));
      setParty(resetParty);setEncKills(newEncKills);setStageIdx(newStageIdx);
      setScr('map');bgm('field');setBusy(false);return;
    }

    setParty(result.party);setEnemies(result.enemies);setInventory(result.inv);

    // Check if all party dead
    if(result.party.every(m=>m.hp<=0)){
      stopBgm();SFX.dead();setScr('gameover');setBusy(false);return;
    }

    // Advance turn phase
    const nextPhase=turnPhase==='p0'?(result.party[1]?.hp>0?'p1':'enemy'):'enemy';

    if(nextPhase==='enemy'){
      setTurnPhase('enemy');
      await sleep(300);
      const eResult=await runEnemyTurn(result.party,result.enemies);
      setParty(eResult.party);setEnemies(eResult.enemies);
      if(eResult.allDead){stopBgm();SFX.dead();setScr('gameover');setBusy(false);return;}
      setTurnPhase('p0');
    } else {
      setTurnPhase(nextPhase);
    }
    setBusy(false);

    const dec=aiDecide(member,enemies,inventory);
    const timer=setTimeout(()=>{
      if(autoRef.current)handleAction(dec.action,dec.target??enemies.findIndex(e=>e.hp>0));

        hp:item.effect.maxHpBonus?m.hp+item.effect.maxHpBonus:m.hp,
      })));

    } else {
      // Consumable: add to shared inventory (capped)
      const cnt=inventory.filter(i=>i.id===item.id).length;
      if(cnt>=5){addLog('これ以上は持てない！(最大5個)');return;}
      setInventory(p=>[...p,{...item}]);

    const mpIdx=inventory.findIndex(i=>i.effect?.mp&&!i.effect?.hp);
    const m=party[pIdx];
    if(!m||m.hp<=0)return;

    if(m.status&&cureIdx>=0){
      const item=inventory[cureIdx];
      const newInv=[...inventory];newInv.splice(cureIdx,1);
      setInventory(newInv);
      setParty(p=>{const n=[...p];n[pIdx]={...m,status:null,statusTurns:0};return n;});
      SFX.heal();addLog(`${item.emoji} ${CLASSES[m.classId].name}の状態異常を回復！`);
      return;
    }
    if(m.hp<m.maxHp&&healIdx>=0){
      const item=inventory[healIdx];
      // FIXED: strict cap at maxHp
      const add=Math.min(item.effect.hp, m.maxHp-m.hp);
      const newHp=Math.min(m.maxHp, m.hp+item.effect.hp);
      const newInv=[...inventory];newInv.splice(healIdx,1);

                {turnPhase==='enemy'?'💢 敵のターン…':activeMember?`${CLASSES[activeMember.classId].cEmoji} ${CLASSES[activeMember.classId].name}のターン！`:''}
              </div>
              <button onClick={()=>setAutoMode(v=>!v)} style={{background:autoMode?'rgba(34,197,94,0.25)':'rgba(80,80,90,0.2)',border:`1px solid ${autoMode?'#22c55e':'#2a2a4a'}`,color:autoMode?'#22c55e':'#475569',padding:'4px 12px',borderRadius:'16px',fontSize:'0.75rem',fontWeight:900,cursor:'pointer',transition:'all 0.2s'}}>
                {autoMode?'AUTO●':'AUTO○'}
              </button>
            </div>
            {/* Action buttons */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px'}}>
              {activeMember&&CLASSES[activeMember.classId]&&[
                {l:'⚔️ こうげき',s:'通常攻撃',c:'#dc2626',dis:busy||autoMode||turnPhase==='enemy',fn:()=>handleAction('atk',enemies.findIndex(e=>e.hp>0))},
                {l:`${CLASSES[activeMember.classId].skill.e} 必殺技`,s:activeMember.skillUsed?'使用済み':`MP ${CLASSES[activeMember.classId].skill.mp}`,c:'#7c3aed',dis:busy||autoMode||activeMember.skillUsed||activeMember.mp<CLASSES[activeMember.classId].skill.mp||turnPhase==='enemy',fn:()=>handleAction('skill',enemies.findIndex(e=>e.hp>0))},
                {l:'🌿 アイテム',s:`${inventory.length}個所持`,c:'#16a34a',dis:busy||autoMode||inventory.length===0||turnPhase==='enemy',fn:()=>handleAction('heal',0)},
                {l:'🏃 にげる',s:'60%成功',c:'#4b5563',dis:busy||autoMode||turnPhase==='enemy',fn:()=>handleAction('flee',0)},
              ].map(b=>(
                <button key={b.l} disabled={b.dis} onClick={b.fn} style={{...bs(b.c,b.dis),margin:0,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',padding:'12px 6px'}}>
                  <span style={{fontSize:'0.92rem'}}>{b.l}</span>
                  <span style={{fontSize:'0.65rem',opacity:0.72,fontWeight:'normal'}}>{b.s}</span>
                </button>
              ))}
              {(!activeMember||turnPhase==='enemy')&&
                <div style={{gridColumn:'1/-1',textAlign:'center',color:'#374151',fontSize:'0.8rem',padding:'8px'}}>
                  {turnPhase==='enemy'?'🔄 敵の行動中...':'✅ ターン終了待機'}
                </div>
              }
            </div>
          </div>
        </>
      )}

      {/* ===== SHOP ===== */}
      {scr==='shop'&&party.length>0&&(
        <div className="card" style={{animation:'fadeIn 0.3s ease',borderColor:'rgba(212,160,23,0.18)'}}>
          <div style={{color:'#d4a017',fontWeight:900,textAlign:'center',marginBottom:'10px'}}>🛒 装備ショップ　Gold: {sharedGold}</div>
          <div style={{fontSize:'0.7rem',color:'#475569',textAlign:'center',marginBottom:'10px'}}>装備品は全員に適用 / 消耗品は在庫に追加</div>
          {ITEMS.map(item=>(
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:'7px',marginBottom:'7px',padding:'9px',background:'rgba(255,255,255,0.025)',borderRadius:'9px'}}>
              <span style={{fontSize:'1.3rem'}}>{item.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'0.82rem',fontWeight:'bold'}}>{item.name}</div>
                <div style={{fontSize:'0.68rem',color:'#64748b'}}>{item.desc}</div>
              </div>
              <button onClick={()=>buyItem(item)} disabled={sharedGold<item.cost} style={{...bs('#d97706',sharedGold<item.cost,true),margin:0}}>{item.cost}G</button>
            </div>
          ))}
          {/* Use items in map */}
          {inventory.length>0&&(
            <div style={{borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:'10px',marginTop:'4px'}}>
              <div style={{color:'#94a3b8',fontSize:'0.72rem',marginBottom:'6px'}}>在庫アイテムを使う：</div>
              <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
                {party.map((m,i)=>(
                  <button key={i} onClick={()=>useConsumable(i)} style={{...bs(CLASSES[m.classId].color,m.hp<=0,true),margin:0}}>
                    {CLASSES[m.classId].cEmoji} {CLASSES[m.classId].name}に使う
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{textAlign:'center',marginTop:'10px'}}>
            <button style={bs('#374151')} onClick={()=>{SFX.cursor();setScr('map');}}>🔙 もどる</button>
          </div>
        </div>
      )}

      {/* ===== GAME OVER ===== */}
      {scr==='gameover'&&(
        <div className="card" style={{textAlign:'center',animation:'popIn 0.5s ease',borderColor:'rgba(220,38,38,0.35)'}}>
          <div style={{fontSize:'4rem',marginBottom:'7px'}}>💀</div>
          <div style={{color:'#dc2626',fontSize:'1.5rem',fontWeight:900,letterSpacing:'0.08em',marginBottom:'4px'}}>GAME OVER</div>
          <div style={{color:'#64748b',marginBottom:'4px',fontSize:'0.88rem'}}>パーティは全滅した…</div>
          <div style={{color:'#374151',fontSize:'0.75rem',marginBottom:'14px'}}>{STAGES[stageIdx].name}にて</div>
          <button style={bs('#dc2626')} onClick={restart}>🔄 もういちど</button>
        </div>
      )}

      {/* ===== CLEAR ===== */}
      {scr==='clear'&&(
        <div className="card" style={{textAlign:'center',animation:'popIn 0.5s ease',borderColor:'rgba(212,160,23,0.4)'}}>
          <div style={{fontSize:'4rem',marginBottom:'7px',animation:'winSpin 0.8s ease-in-out infinite'}}>🏆</div>
          <div style={{color:'#d4a017',fontSize:'1.4rem',fontWeight:900,marginBottom:'6px'}}>🎉 全ステージクリア！ 🎉</div>
          <div style={{color:'#a3e635',marginBottom:'4px'}}>魔天王ゼロスを討伐した！</div>
          <div style={{color:'#64748b',fontSize:'0.78rem',marginBottom:'14px'}}>
            {party.map(m=>`${CLASSES[m.classId].name} Lv.${m.level}`).join(' / ')}
          </div>
          <button style={bs('#d4a017')} onClick={restart}>🔄 もういちど</button>
        </div>
      )}

      {/* ===== LOG ===== */}
      {scr!=='title'&&scr!=='select'&&(
        <div className="card" style={{maxHeight:'130px',overflowY:'auto',borderColor:'rgba(255,255,255,0.05)'}}>
          {log.map((e,i)=>(
            <div key={i} style={{padding:'2px 0',fontSize:'0.77rem',lineHeight:1.5,borderBottom:'1px solid rgba(255,255,255,0.04)',opacity:1-i*0.07,color:i===0?'#c8d4e8':'#4b5563'}}>{e}</div>
          ))}
        </div>
      )}

      {/* iOS hint */}
      <div id="iosHint" style={{display:'none',position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(135deg,#0f0e2a,#1e1b4b)',borderTop:'1px solid #d4a01755',padding:'11px',zIndex:9999,alignItems:'center',gap:'10px'}}>
        <div style={{flex:1,fontSize:'0.78rem',color:'#dde4f0'}}>📱 Safari → 共有(□↑) →「ホーム画面に追加」でアプリになるよ！</div>
        <button onClick={()=>document.getElementById('iosHint').style.display='none'} style={{background:'transparent',border:'none',color:'#4b5563',fontSize:'1.2rem',cursor:'pointer'}}>✕</button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isSA=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
if(isIOS&&!isSA)setTimeout(()=>{const b=document.getElementById('iosHint');if(b)b.style.display='flex';},6000);
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
