  C4:262,Db4:277,D4:294,Eb4:311,E4:330,F4:349,Gb4:370,G4:392,Ab4:415,A4:440,Bb4:466,B4:494,

  C6:1047,D6:1175,E6:1319,G6:1568

// DQ-style BGM sequences: [freq, beats]
const BGMS={
  field:{bpm:112,seq:[
    [N.C5,.5],[N.E5,.5],[N.G5,.5],[N.E5,.5],[N.F5,.5],[N.A5,.5],[N.C6,1],[N.R,.5],[N.C6,.25],[N.B5,.25],

class AudioMgr{
  constructor(){this.ctx=null;this.tid=null;this.cur=null;this.on=true;}
  getCtx(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume();return this.ctx;}
  note(f,t,dur,vol=0.18,wave='square'){
    if(!f||!this.on)return;
    try{const c=this.getCtx(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=wave;o.frequency.value=f;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.88);
    o.start(t);o.stop(t+dur);}catch(e){}
  }
  bgm(name){
    if(this.cur===name)return;
    this.stopBgm();this.cur=name;this._loop(name);
  }
  _loop(name){
    if(this.cur!==name||!this.on)return;
    const b=BGMS[name];if(!b)return;
    try{const c=this.getCtx();let t=c.currentTime+0.05;const bd=60/b.bpm;
    b.seq.forEach(([f,beats])=>{this.note(f,t,beats*bd*0.88);t+=beats*bd;});
    this.tid=setTimeout(()=>this._loop(name),(t-c.currentTime)*1000-80);}catch(e){}
  }
  stopBgm(){this.cur=null;if(this.tid)clearTimeout(this.tid);this.tid=null;}
  sfx(type){
    if(!this.on)return;
    const c=this.getCtx(),now=c.currentTime;
    const t=(f,dur,vol,wave='square',delay=0)=>this.note(f,now+delay,dur,vol,wave);
    const map={
      attack:()=>{t(220,.1,.5,'sawtooth');t(180,.15,.25,'square',.05);},
      skill:()=>{[440,554,659].forEach((f,i)=>t(f,.3,.28,'sawtooth',i*.05));t(880,.45,.18,'sine',.2);},
      magic:()=>{[523,659,784,1047].forEach((f,i)=>t(f,.2,.22,'sine',i*.06));t(1319,.3,.15,'triangle',.28);},
      heal:()=>{[523,659,784].forEach((f,i)=>t(f,.28,.22,'sine',i*.09));},
      fullheal:()=>{[523,659,784,1047,1319].forEach((f,i)=>t(f,.35,.22,'sine',i*.08));},
      hit:()=>{t(150,.09,.6,'sawtooth');t(100,.13,.35,'square',.04);},
      phit:()=>{t(200,.13,.5,'sawtooth');t(130,.16,.32,'square',.06);},
      lvup:()=>{[523,659,784,1047].forEach((f,i)=>t(f,.35,.28,'triangle',i*.11));},
      victory:()=>{[523,659,784,1047,1319,1568].forEach((f,i)=>t(f,.4,.28,'triangle',i*.11));},
      dead:()=>{[440,330,220,110].forEach((f,i)=>t(f,.45,.25,'sawtooth',i*.16));},
      cursor:()=>{t(660,.09,.22,'sine');},
      flee:()=>{[300,200,150].forEach((f,i)=>t(f,.22,.22,'sawtooth',i*.07));},
      buy:()=>{t(880,.15,.3,'sine');t(1100,.15,.22,'sine',.11);},
      save:()=>{[440,550,660].forEach((f,i)=>t(f,.2,.22,'sine',i*.07));},
    };
    if(map[type])map[type]();
  }
  toggle(){this.on=!this.on;if(!this.on)this.stopBgm();return this.on;}
}

const SAVE_KEY='yuuri_souya_save_v2';
function saveGame(state){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));return true;}catch(e){return false;}
}
function loadGame(){
  try{const d=localStorage.getItem(SAVE_KEY);return d?JSON.parse(d):null;}catch(e){return null;}
}
function deleteSave(){
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
}
function hasSave(){
  return !!localStorage.getItem(SAVE_KEY);

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// Monster visual component
function MonSprite({mon,anim,size=5}){
  const baseStyle={fontSize:`${size}rem`,lineHeight:1,display:'inline-block',filter:mon.filter||'none',transition:'filter 0.2s'};
  const animStyle=anim==='hurt'?{animation:'shakeX 0.4s ease',filter:(mon.filter||'none')+' drop-shadow(0 0 22px rgba(255,50,0,1))'}
    :anim==='dead'?{opacity:0,transform:'rotate(90deg) scale(0.2)',transition:'all 0.6s'}
    :anim==='skill'?{animation:'winSpin 0.5s ease',filter:(mon.filter||'none')+' drop-shadow(0 0 22px rgba(255,215,0,1))'}
    :{animation:'float 2.5s ease-in-out infinite'};
  return(
    <div style={{position:'relative',display:'inline-block'}}>
      <span style={{...baseStyle,...animStyle}}>{mon.base}</span>
      {mon.top&&<span style={{position:'absolute',top:'-10px',right:'-8px',fontSize:`${size*0.36}rem`,pointerEvents:'none'}}>{mon.top}</span>}
    </div>
  );
}

// HP bar
function HpBar({hp,maxHp,label,color}){
  const pct=Math.max(0,(hp/maxHp)*100);
  const col=pct>50?'#22c55e':pct>25?'#facc15':'#ef4444';
  return(
    <div style={{marginBottom:'6px'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.78rem',marginBottom:'2px'}}>
        <span style={{color,fontWeight:900}}>{label}</span>
        <span style={{color:'#94a3b8'}}>{Math.max(0,hp)}/{maxHp}</span>
      </div>
      <div className="hptrack"><div className="hpfill" style={{width:pct+'%',background:`linear-gradient(90deg,${col},${col}99)`,boxShadow:`0 0 6px ${col}88`}}/></div>
    </div>
  );
}

// EXP bar with next level info
function ExpBar({exp,level}){
  const prev=level===1?0:calcNext(level-1);
  const next=calcNext(level);
  const cur=exp-prev;
  const needed=next-prev;
  const pct=Math.min(100,(cur/needed)*100);
  return(
    <div style={{marginTop:'6px'}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.7rem',color:'#6366f1',marginBottom:'2px'}}>
        <span>EXP</span><span>{cur}/{needed}（次のレベルまで{needed-cur}）</span>
      </div>
      <div className="exptrack"><div className="expfill" style={{width:pct+'%'}}/></div>
    </div>
  );
}

function initPlayer(classId){
  const c=CLASSES[classId];
  return{classId,...c,hp:c.hp,maxHp:c.hp,mp:c.mp,maxMp:c.mp,atk:c.atk,def:c.def,mat:c.mat,
    exp:0,level:1,gold:120,inventory:[],stage:0,stageKills:0,skillUsed:false,name:c.name};
}

function App(){
  const [scr,setScr]=useState('title'); // title|select|map|battle|shop|save|gameover|clear
  const [pl,setPl]=useState(null);
  const [mon,setMon]=useState(null);
  const [log,setLog]=useState([]);
  const [busy,setBusy]=useState(false);
  const [pAnim,setPAnim]=useState('idle');
  const [mAnim,setMAnim]=useState('idle');
  const [showSkill,setShowSkill]=useState(false);
  const [dmgs,setDmgs]=useState([]);
  const [sparks,setSparks]=useState([]);
  const [autoMode,setAutoMode]=useState(false);
  const [muted,setMuted]=useState(false);
  const [saveMsg,setSaveMsg]=useState('');
  const uid=useRef(0);
  const autoRef=useRef(autoMode);
  useEffect(()=>{autoRef.current=autoMode;},[autoMode]);

  const addLog=m=>setLog(p=>[m,...p].slice(0,10));
  const addDmg=(v,type)=>{const id=uid.current++;setDmgs(p=>[...p,{id,v,type}]);setTimeout(()=>setDmgs(p=>p.filter(d=>d.id!==id)),950);};
  const addSpark=(x,y)=>{const id=uid.current++;setSparks(p=>[...p,{id,x,y}]);setTimeout(()=>setSparks(p=>p.filter(s=>s.id!==id)),650);};

  // Choose monster for current stage
  const pickMonster=(player)=>{
    const stg=MONSTERS_BY_STAGE[player.stage];
    if(player.stageKills>=3) return {...stg[3],hp:stg[3].maxHp}; // boss
    const idx=Math.min(player.stageKills,2);
    return {...stg[idx],hp:stg[idx].maxHp};
  };

  // Auto-battle AI decision
  const aiDecide=(player,monster)=>{
    const hpRatio=player.hp/player.maxHp;
    const hasHeal=player.inventory.some(i=>i.effect?.hp);
    if(hpRatio<0.25&&hasHeal) return 'heal';
    if(!player.skillUsed&&player.mp>=CLASSES[player.classId].skill.mp) return 'skill';
    if(hpRatio<0.15&&Math.random()<0.3) return 'flee';
    return 'attack';
  };

  const doEncounter=(playerState)=>{
    aud.sfx('cursor');
    const m=pickMonster(playerState||pl);
    setMon(m);setPAnim('idle');setMAnim('idle');
    setScr('battle');
    addLog(`⚠️ ${m.base}${m.top||''} ${m.name}があらわれた！`);
    if(m.isBoss) addLog('🚨 ボスだ！全力でたたかえ！');
    if((playerState||pl).stage===3&&(playerState||pl).stageKills>=3){
      aud.bgm('boss');
    } else {
      aud.bgm(STAGES[(playerState||pl).stage].bgm);
    }
  };

  // Combat step
  const doAction=useCallback(async(action,currentPl,currentMon)=>{
    if(!currentMon)return;
    aud.getCtx();
    const cls=CLASSES[currentPl.classId];
    let newPl={...currentPl};
    let newMon={...currentMon};
    let ended=false;

    if(action==='heal'){
      const idx=newPl.inventory.findIndex(i=>i.effect?.hp||i.effect?.mp);
      if(idx===-1){addLog('💊 アイテムがない！');return{pl:newPl,mon:newMon,ended:false};}
      const item=newPl.inventory[idx];
      const inv=[...newPl.inventory];inv.splice(idx,1);
      if(item.effect.hp){
        const add=Math.min(item.effect.hp,newPl.maxHp-newPl.hp);
        newPl={...newPl,hp:Math.min(newPl.maxHp,newPl.hp+item.effect.hp),inventory:inv};
        aud.sfx(item.effect.hp>200?'fullheal':'heal');
        addDmg(add>200?'MAX':add,'h');
        addLog(`${item.emoji} ${item.name}をつかった！HP+${Math.min(item.effect.hp,currentPl.maxHp-currentPl.hp)}`);
      } else if(item.effect.mp){
        newPl={...newPl,mp:Math.min(newPl.maxMp,newPl.mp+item.effect.mp),inventory:inv};
        addLog(`${item.emoji} ${item.name}をつかった！MP+${item.effect.mp}`);
      }
      return{pl:newPl,mon:newMon,ended:false};
    }

    if(action==='flee'){
      if(Math.random()>0.4){
        aud.sfx('flee');addLog('🏃 にげだした！');
        return{pl:newPl,mon:null,ended:false,fled:true};
      }
      const dmg=Math.max(1,newMon.atk-newPl.def);
      aud.sfx('phit');setPAnim('hurt');addSpark('15%','25%');addDmg(dmg,'p');
      addLog(`❌ にげられなかった！${dmg}ダメージ！`);
      newPl={...newPl,hp:newPl.hp-dmg};
      await sleep(350);setPAnim('idle');
      if(newPl.hp<=0) return{pl:{...newPl,hp:0},mon:newMon,ended:true,dead:true};
      return{pl:newPl,mon:newMon,ended:false};
    }

    // Attack or skill
    const isSkill=action==='skill';
    let dmg;
    if(isSkill){
      if(newPl.mp<cls.skill.mp){addLog(`MP不足！（必要MP: ${cls.skill.mp}）`);return{pl:newPl,mon:newMon,ended:false};}
      dmg=cls.skill.fn(newPl);
      newPl={...newPl,mp:newPl.mp-cls.skill.mp,skillUsed:true};
      setPAnim('skill');setShowSkill(true);
      aud.sfx(currentPl.classId==='mage'?'magic':'skill');
    } else {
      dmg=Math.max(1,newPl.atk-newMon.def+Math.floor(Math.random()*6)-2);
      setPAnim('attack');aud.sfx('attack');
    }
    await sleep(280);setShowSkill(false);setPAnim('idle');

    // Weakness bonus
    if(newMon.weak===newPl.classId) dmg=Math.floor(dmg*1.35);
    dmg=Math.max(1,dmg);

    setMAnim('hurt');aud.sfx('hit');addSpark('62%','28%');addDmg(dmg,'e');
    addLog(isSkill
      ?`✨ ${cls.skill.name}！${dmg}ダメージ！${newMon.weak===newPl.classId?'🎯こうかばつぐん！':''}`
      :`⚔️ こうげき！${dmg}ダメージ！${newMon.weak===newPl.classId?'🎯こうかばつぐん！':''}`);
    newMon={...newMon,hp:newMon.hp-dmg};
    await sleep(380);

    if(newMon.hp<=0){
      setMAnim('dead');aud.sfx('victory');
      addLog(`🎉 ${newMon.name}をたおした！EXP+${newMon.exp} G+${newMon.gold}`);
      newPl={...newPl,exp:newPl.exp+newMon.exp,gold:newPl.gold+newMon.gold};
      // Level up check
      while(newPl.exp>=calcNext(newPl.level)){
        newPl={...newPl,level:newPl.level+1,maxHp:newPl.maxHp+22,hp:newPl.maxHp+22,
          maxMp:newPl.maxMp+8,mp:newPl.maxMp+8,atk:newPl.atk+4,def:newPl.def+3,mat:newPl.mat+4};
        aud.sfx('lvup');addLog(`🌟 レベルアップ！Lv.${newPl.level}！HP・MP全回復！`);
      }
      // Stage progress
      const kills=newPl.stageKills+1;
      if(newMon.isBoss){
        if(newPl.stage>=3){return{pl:newPl,mon:null,ended:true,clear:true};}
        newPl={...newPl,stage:newPl.stage+1,stageKills:0,skillUsed:false};
        addLog(`🚪 ${STAGES[newPl.stage].name}へ進んだ！`);
      } else {
        newPl={...newPl,stageKills:kills,skillUsed:false};
      }
      return{pl:newPl,mon:null,ended:true,killed:true};
    }

    setMAnim('idle');
    // Monster attacks
    await sleep(250);
    const mdmg=Math.max(1,newMon.atk-newPl.def+Math.floor(Math.random()*5)-2);
    setPAnim('hurt');aud.sfx('phit');addSpark('15%','22%');addDmg(mdmg,'p');
    addLog(`💢 ${newMon.name}のこうげき！${mdmg}ダメージ！`);
    newPl={...newPl,hp:newPl.hp-mdmg};
    await sleep(350);setPAnim('idle');
    if(newPl.hp<=0) return{pl:{...newPl,hp:0},mon:newMon,ended:true,dead:true};
    return{pl:newPl,mon:newMon,ended:false};
  },[]);

  const executeAction=async(action)=>{
    if(busy||!mon)return;
    setBusy(true);
    const result=await doAction(action,pl,mon);
    if(!result){setBusy(false);return;}
    setPl(result.pl);
    if(result.mon!==undefined) setMon(result.mon);
    if(result.clear){aud.stopBgm();setScr('clear');}
    else if(result.dead){aud.stopBgm();aud.sfx('dead');setScr('gameover');}
    else if(result.fled){setScr('map');aud.bgm('field');}
    else if(result.killed){setScr('map');aud.bgm('field');}
    else if(autoRef.current&&result.pl.hp>0){
      // Continue auto-battle
      await sleep(600);
      const nextAction=aiDecide(result.pl,result.mon);
      setBusy(false);
      executeAction(nextAction);
      return;
    }
    setBusy(false);
  };

  // Auto-battle trigger
  useEffect(()=>{
    if(autoMode&&scr==='battle'&&!busy&&mon&&pl){
      const timer=setTimeout(()=>{
        if(autoRef.current&&!busy){
          const act=aiDecide(pl,mon);
          executeAction(act);
        }
      },800);
      return()=>clearTimeout(timer);
    }
  },[autoMode,scr,busy,mon,pl]);

  const doSave=()=>{
    if(!pl) return;
    const ok=saveGame({pl,log});
    aud.sfx('save');
    setSaveMsg(ok?'💾 セーブしました！':'❌ セーブ失敗...');
    setTimeout(()=>setSaveMsg(''),2500);
  };

  const doLoad=()=>{
    const data=loadGame();
    if(!data){setSaveMsg('❌ セーブデータがありません');setTimeout(()=>setSaveMsg(''),2000);return;}
    setPl(data.pl);setLog(data.log||[]);
    setSaveMsg('📂 ロードしました！');setTimeout(()=>setSaveMsg(''),2000);
    setScr('map');aud.bgm('field');
  };

  const buyItem=(item)=>{
    if(pl.gold<item.cost){addLog('💸 おかねがたりない！');return;}
    aud.sfx('buy');
    setPl(p=>({...p,gold:p.gold-item.cost,
      atk:item.effect.atk?p.atk+item.effect.atk:p.atk,
      def:item.effect.def?p.def+item.effect.def:p.def,
      mat:item.effect.mat?p.mat+item.effect.mat:p.mat,
      maxHp:item.effect.hp?p.maxHp+item.effect.hp:p.maxHp,
      hp:item.effect.hp?Math.min(p.hp+item.effect.hp,p.maxHp+item.effect.hp):p.hp,
      inventory:item.effect.hp&&item.id!=='armor'?[...p.inventory,item]:p.inventory,
    }));
    addLog(`🛒 ${item.emoji}${item.name}をかった！`);
  };

  const restart=()=>{setPl(null);setMon(null);setLog([]);setScr('title');aud.stopBgm();};
  const cc=pl?CLASSES[pl.classId].color:'#ffd700';
  const stage=pl?STAGES[pl.stage]:STAGES[0];

  // Styles
  const card={...{className:'card'},style:{borderColor:`${cc}22`}};
  const btnStyle=(col,dis=false)=>({background:dis?'rgba(80,80,80,0.25)':`linear-gradient(135deg,${col}bb,${col}44)`,border:`1px solid ${dis?'#333':col}`,color:dis?'#444':'#fff',padding:'10px 14px',borderRadius:'10px',fontFamily:'inherit',fontWeight:900,fontSize:'0.88rem',cursor:dis?'not-allowed':'pointer',boxShadow:dis?'none':`0 0 10px ${col}33`,transition:'all 0.15s',margin:'4px'});

  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#06060e,#0c0820,#060e06)',display:'flex',flexDirection:'column',alignItems:'center',padding:'14px 10px 80px',color:'#e2e8f0'}}>

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',maxWidth:'460px',marginBottom:'4px'}}>
        <div style={{fontSize:'clamp(0.9rem,4vw,1.3rem)',fontWeight:900,background:'linear-gradient(90deg,#ffd700,#ff6b35,#ffd700)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',filter:'drop-shadow(0 0 12px rgba(255,200,0,0.4))'}}>
          ✨ ゆうりとそうやの大冒険 ✨
        </div>
        <button onClick={()=>{const on=aud.toggle();setMuted(!on);}} style={{background:'transparent',border:'1px solid #333',borderRadius:'8px',color:'#94a3b8',padding:'5px 8px',fontSize:'0.8rem',cursor:'pointer'}}>
          {muted?'🔇':'🔊'}
        </button>
      </div>
      {saveMsg&&<div style={{background:'rgba(100,200,100,0.2)',border:'1px solid #4ade8066',borderRadius:'8px',padding:'6px 14px',fontSize:'0.82rem',marginBottom:'8px',color:'#4ade80',animation:'fadeIn 0.3s ease'}}>{saveMsg}</div>}

      {/* ===== TITLE ===== */}
      {scr==='title'&&(
        <div style={{width:'100%',maxWidth:'460px',textAlign:'center',animation:'fadeIn 0.4s ease'}}>
          <div style={{fontSize:'4rem',margin:'24px 0 8px',animation:'float 3s ease-in-out infinite'}}>🏰</div>
          <div style={{color:'#94a3b8',fontSize:'0.82rem',marginBottom:'24px'}}>4つのステージを超え、魔天王を倒せ！</div>
          <button onClick={()=>{aud.sfx('cursor');aud.getCtx();setScr('select');}} style={{...btnStyle('#ffd700'),padding:'14px 36px',fontSize:'1rem',display:'block',margin:'0 auto 12px',width:'80%'}}>
            🗡️ はじめから
          </button>
          {hasSave()&&<button onClick={doLoad} style={{...btnStyle('#22c55e'),padding:'14px 36px',fontSize:'1rem',display:'block',margin:'0 auto 12px',width:'80%'}}>
            📂 つづきから
          </button>}
          <button onClick={()=>{aud.sfx('cursor');setScr('select');}} style={{...btnStyle('#6b7280',!hasSave()),padding:'10px 24px',fontSize:'0.85rem',display:'block',margin:'0 auto',opacity:hasSave()?1:0.3}}>
            ℹ️ キャラ選択だけ変える
          </button>
        </div>
      )}

      {/* ===== CLASS SELECT ===== */}
      {scr==='select'&&(
        <div style={{width:'100%',maxWidth:'460px',animation:'fadeIn 0.4s ease'}}>
          <div style={{textAlign:'center',color:'#ffd700',fontWeight:900,marginBottom:'12px',fontSize:'1rem'}}>⚔️ クラスを選べ！</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            {Object.values(CLASSES).map(c=>(
              <div key={c.id} onClick={()=>{aud.sfx('cursor');const p=initPlayer(c.id);setPl(p);setLog([`🌟 ${c.name}の冒険、はじまり！`]);setScr('map');aud.bgm('field');}}
                style={{background:c.bg,border:`2px solid ${c.color}55`,borderRadius:'14px',padding:'14px 10px',cursor:'pointer',textAlign:'center',transition:'all 0.2s'}}
                onTouchStart={e=>e.currentTarget.style.transform='scale(0.96)'}
                onTouchEnd={e=>e.currentTarget.style.transform=''}>
                <div style={{fontSize:'2.5rem',marginBottom:'6px',animation:'floatFast 2.5s ease-in-out infinite'}}>{c.emoji}</div>
                <div style={{color:c.color,fontWeight:900,fontSize:'1rem',marginBottom:'3px'}}>{c.name}</div>
                <div style={{color:'#64748b',fontSize:'0.7rem',marginBottom:'8px'}}>{c.desc}</div>
                <div style={{fontSize:'0.68rem',color:'#475569',lineHeight:1.6}}>
                  HP:{c.hp} MP:{c.mp}<br/>ATK:{c.atk} DEF:{c.def}
                </div>
                <div style={{marginTop:'8px',padding:'5px 6px',background:`${c.color}22`,borderRadius:'6px',fontSize:'0.68rem',color:c.color}}>
                  {c.skill.emoji} {c.skill.name}<br/><span style={{opacity:0.8}}>{c.skill.desc}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ===== MAP ===== */}
      {scr==='map'&&pl&&(
        <>
          <div className="card" style={{borderColor:`${cc}33`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
              <span style={{color:cc,fontWeight:900,fontSize:'0.95rem'}}>{CLASSES[pl.classId].emoji} {pl.name} Lv.{pl.level}</span>
              <span style={{color:'#fbbf24',fontSize:'0.82rem'}}>💰 {pl.gold}G</span>
            </div>
            <HpBar hp={pl.hp} maxHp={pl.maxHp} label={`HP`} color={cc}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.75rem',color:'#94a3b8',marginBottom:'4px'}}>
              <span>MP: {pl.mp}/{pl.maxMp}</span>
              <span>ATK:{pl.atk} DEF:{pl.def} MAT:{pl.mat}</span>
            </div>
            <ExpBar exp={pl.exp} level={pl.level}/>
            <div style={{fontSize:'0.68rem',color:'#475569',marginTop:'4px'}}>
              持ち物: {pl.inventory.map(i=>i.emoji).join('')||'なし'}
            </div>
          </div>

          {/* Stage info */}
          <div className="card" style={{textAlign:'center',borderColor:`${cc}22`}}>
            <div style={{fontSize:'3.5rem',animation:'float 3s ease-in-out infinite',marginBottom:'6px'}}>{stage.emoji}</div>
            <div style={{color:cc,fontWeight:900,marginBottom:'4px'}}>{stage.name}</div>
            <div style={{fontSize:'0.75rem',color:'#475569',marginBottom:'14px'}}>
              {pl.stageKills<3?`あと${3-pl.stageKills}体たおすとボス登場！`:'🚨 ボスが待っている！'}
            </div>
            {/* Progress dots */}
            <div style={{display:'flex',justifyContent:'center',gap:'8px',marginBottom:'14px'}}>
              {[0,1,2,3].map(i=>(
                <div key={i} style={{width:'18px',height:'18px',borderRadius:'50%',fontSize:'0.7rem',display:'flex',alignItems:'center',justifyContent:'center',
                  background:i<pl.stageKills?cc:i===3&&pl.stageKills>=3?'#ef4444':'rgba(255,255,255,0.1)',
                  border:`1px solid ${i===3?'#ef4444':cc}55`}}>
                  {i===3?'👑':i<pl.stageKills?'✓':''}
                </div>
              ))}
            </div>
            <div style={{display:'flex',flexWrap:'wrap',justifyContent:'center'}}>
              <button style={btnStyle('#ef4444')} onClick={()=>doEncounter()}>⚔️ たたかう</button>
              <button style={btnStyle('#f59e0b')} onClick={()=>{aud.sfx('cursor');setScr('shop');}}>🛒 ショップ</button>
              <button style={btnStyle('#22c55e')} onClick={doSave}>💾 セーブ</button>
            </div>
          </div>

          {/* Stage map */}
          <div className="card" style={{borderColor:'rgba(255,255,255,0.08)'}}>
            <div style={{fontSize:'0.75rem',color:'#475569',marginBottom:'6px'}}>📍 ステージマップ</div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              {STAGES.map((s,i)=>(
                <div key={i} style={{flex:1,textAlign:'center',fontSize:'0.7rem',padding:'6px 4px',borderRadius:'8px',
                  background:i===pl.stage?`${cc}22`:i<pl.stage?'rgba(255,255,255,0.04)':'transparent',
                  border:i===pl.stage?`1px solid ${cc}44`:'1px solid transparent'}}>
                  <div style={{fontSize:'1.3rem'}}>{s.emoji}</div>
                  <div style={{color:i===pl.stage?cc:i<pl.stage?'#22c55e':'#475569',fontWeight:i===pl.stage?900:400}}>
                    {i<pl.stage?'✅':i===pl.stage?'📍':'🔒'}
                  </div>
                  <div style={{color:'#475569',fontSize:'0.62rem'}}>{s.name.slice(0,3)}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      {/* ===== BATTLE ===== */}
      {scr==='battle'&&pl&&mon&&(
        <>
          {/* Battle visual stage */}
          <div style={{position:'relative',width:'100%',maxWidth:'460px',height:'235px',borderRadius:'16px',overflow:'hidden',marginBottom:'10px',border:`2px solid ${mon.isBoss?'rgba(255,50,50,0.4)':'rgba(255,150,50,0.2)'}`}}>
            <div style={{position:'absolute',inset:0,background:stage.sky}}/>
            <div style={{position:'absolute',inset:0,backgroundImage:'radial-gradient(circle,rgba(255,255,255,0.7) 1px,transparent 1px)',backgroundSize:'22px 22px',animation:'starPulse 4s ease-in-out infinite'}}/>
            {mon.isBoss&&<div style={{position:'absolute',inset:0,background:`radial-gradient(circle at center,${mon.glowColor}15,transparent 70%)`,animation:'starPulse 2s ease-in-out infinite'}}/>}
            {/* Ground */}
            <div style={{position:'absolute',bottom:0,left:0,right:0,height:'58px',background:`linear-gradient(transparent,${stage.ground})`,borderTop:`1px solid ${stage.groundBorder}`}}/>
            {/* Glows under chars */}
            <div style={{position:'absolute',bottom:'10px',left:'15%',width:'70px',height:'14px',background:`${cc}44`,borderRadius:'50%',filter:'blur(6px)',animation:'groundPulse 2s ease-in-out infinite'}}/>
            <div style={{position:'absolute',bottom:'10px',right:'12%',width:'80px',height:'14px',background:`${mon.glowColor}55`,borderRadius:'50%',filter:'blur(8px)',animation:'groundPulse 2.5s .3s ease-in-out infinite'}}/>
            {/* Player */}
            <div style={{position:'absolute',bottom:'32px',left:'10%',fontSize:'4.5rem',lineHeight:1,
              animation:pAnim==='hurt'?'shakeX 0.4s ease':pAnim==='attack'||pAnim==='skill'?'shakeX 0.35s ease':'floatFast 3s ease-in-out infinite',
              filter:`drop-shadow(0 0 10px ${cc}88)${pAnim==='hurt'?' drop-shadow(0 0 18px rgba(255,50,50,1))':pAnim==='skill'?' drop-shadow(0 0 20px rgba(255,215,0,1))':''}`,
              transformOrigin:'bottom center'}}>
              {CLASSES[pl.classId].emoji}
            </div>
            {/* Monster */}
            <div style={{position:'absolute',bottom:'28px',right:'8%',transformOrigin:'bottom center'}}>
              <MonSprite mon={mon} anim={mAnim} size={5.5}/>
            </div>
            {/* VS */}
            <div style={{position:'absolute',top:'45%',left:'50%',transform:'translate(-50%,-50%)',fontSize:'1.1rem',fontWeight:900,color:'rgba(255,200,50,0.25)'}}>VS</div>
            {/* Stage + floor label */}
            <div style={{position:'absolute',top:'8px',left:'50%',transform:'translateX(-50%)',fontSize:'0.7rem',color:'rgba(255,255,255,0.35)',whiteSpace:'nowrap'}}>{stage.emoji} {stage.name}</div>
            {mon.isBoss&&<div style={{position:'absolute',top:'8px',left:'8px',fontSize:'0.7rem',color:'#ef4444',fontWeight:900,animation:'blink 1s ease-in-out infinite'}}>⚠️ BOSS</div>}
            {/* Auto indicator */}
            {autoMode&&<div style={{position:'absolute',top:'8px',right:'8px',fontSize:'0.68rem',color:'#22c55e',background:'rgba(34,197,94,0.2)',padding:'2px 6px',borderRadius:'4px'}}>AUTO▶</div>}
            {/* Skill overlay */}
            {showSkill&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'4.5rem',animation:'skillBurst 0.7s ease forwards',zIndex:50,background:'rgba(255,200,0,0.1)',pointerEvents:'none'}}>
              {CLASSES[pl.classId].skill.emoji}
            </div>}
            {/* Damage numbers */}
            {dmgs.map(d=>(
              <div key={d.id} style={{position:'absolute',fontWeight:900,fontSize:'1.9rem',pointerEvents:'none',zIndex:100,animation:'dmgUp 0.95s ease forwards',textShadow:'0 2px 8px rgba(0,0,0,0.9)',
                color:d.type==='e'?'#ff6b6b':d.type==='h'?'#4ade80':'#ffd700',
                left:d.type==='e'?'56%':'10%',top:'16%'}}>
                {d.type==='h'?`+${d.v}`:`-${d.v}`}
              </div>
            ))}
            {/* Sparks */}
            {sparks.map(s=>Array.from({length:7},(_,i)=>{
              const a=(i/7)*Math.PI*2,dist=28+Math.random()*22;
              return <div key={s.id+i} style={{position:'absolute',width:'6px',height:'6px',borderRadius:'50%',left:s.x,top:s.y,background:`hsl(${15+i*14},100%,65%)`,pointerEvents:'none',zIndex:60,animation:'sparkFly 0.62s ease forwards','--tx':`${Math.cos(a)*dist}px`,'--ty':`${Math.sin(a)*dist}px`}}/>;
            }))}
          </div>

          {/* HP/MP bars */}
          <div className="card" style={{borderColor:'rgba(255,100,80,0.2)'}}>
            <HpBar hp={pl.hp} maxHp={pl.maxHp} label={`${CLASSES[pl.classId].emoji} ${pl.name} Lv.${pl.level}`} color={cc}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.7rem',color:'#6366f1',marginBottom:'6px'}}>
              <span>MP: {pl.mp}/{pl.maxMp}</span>
              {mon.weak===pl.classId&&<span style={{color:'#fbbf24'}}>⚡ このてきに有利！</span>}
            </div>
            <HpBar hp={mon.hp} maxHp={mon.maxHp} label={`${mon.base}${mon.top||''} ${mon.name}${mon.isBoss?' 👑':''}`} color={mon.isBoss?'#ef4444':'#f87171'}/>
          </div>

          {/* Action buttons */}
          <div className="card" style={{borderColor:`${cc}22`}}>
            {/* Auto toggle */}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
              <span style={{fontSize:'0.78rem',color:'#94a3b8'}}>オートバトル</span>
              <button onClick={()=>setAutoMode(v=>!v)} style={{background:autoMode?'rgba(34,197,94,0.3)':'rgba(100,100,100,0.2)',border:`1px solid ${autoMode?'#22c55e':'#444'}`,color:autoMode?'#22c55e':'#666',padding:'4px 14px',borderRadius:'16px',fontSize:'0.78rem',fontWeight:900,cursor:'pointer',transition:'all 0.2s'}}>
                {autoMode?'AUTO ON ●':'AUTO OFF ○'}
              </button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
              {[
                {label:'⚔️ こうげき',sub:'通常攻撃',col:'#ef4444',dis:busy||autoMode,fn:()=>executeAction('attack')},
                {label:`${CLASSES[pl.classId].skill.emoji} 必殺技`,sub:pl.skillUsed?'使用済み':`MP${CLASSES[pl.classId].skill.mp}`,col:'#8b5cf6',dis:busy||autoMode||pl.skillUsed||pl.mp<CLASSES[pl.classId].skill.mp,fn:()=>executeAction('skill')},
                {label:'🌿 かいふく',sub:`${pl.inventory.filter(i=>i.effect?.hp||i.effect?.mp).length}個`,col:'#22c55e',dis:busy||autoMode,fn:()=>executeAction('heal')},
                {label:'🏃 にげる',sub:'成功60%',col:'#6b7280',dis:busy||autoMode,fn:()=>executeAction('flee')},
              ].map(b=>(
                <button key={b.label} className="abtn" disabled={b.dis} onClick={b.fn} style={{background:b.dis?'rgba(60,60,60,0.2)':`linear-gradient(135deg,${b.col}bb,${b.col}44)`,border:`1px solid ${b.dis?'#333':b.col}`,boxShadow:b.dis?'none':`0 0 12px ${b.col}33`,cursor:b.dis?'not-allowed':'pointer'}}>
                  <span className="icon">{b.label}</span>
                  <span className="sub">{b.sub}</span>
                </button>
              ))}
            </div>
          </div>
        </>
      )}

      {/* ===== SHOP ===== */}
      {scr==='shop'&&pl&&(
        <div className="card" style={{animation:'fadeIn 0.3s ease',borderColor:`${cc}22`}}>
          <div style={{color:'#ffd700',fontWeight:900,textAlign:'center',marginBottom:'12px'}}>🛒 ショップ　所持金: {pl.gold}G</div>
          {ITEMS.map(item=>(
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',padding:'10px',background:'rgba(255,255,255,0.03)',borderRadius:'10px'}}>
              <span style={{fontSize:'1.4rem'}}>{item.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'0.84rem',fontWeight:'bold'}}>{item.name}</div>
                <div style={{fontSize:'0.7rem',color:'#64748b'}}>{item.desc}</div>
              </div>
              <button onClick={()=>buyItem(item)} disabled={pl.gold<item.cost} style={{...btnStyle('#f59e0b',pl.gold<item.cost),margin:0,padding:'7px 10px',fontSize:'0.8rem'}}>{item.cost}G</button>
            </div>
          ))}
          <div style={{textAlign:'center',marginTop:'8px'}}>
            <button style={btnStyle('#475569')} onClick={()=>{aud.sfx('cursor');setScr('map');}}>🔙 もどる</button>
          </div>
        </div>
      )}

      {/* ===== GAME OVER ===== */}
      {scr==='gameover'&&(
        <div className="card" style={{textAlign:'center',animation:'popIn 0.5s ease',borderColor:'rgba(255,50,50,0.3)'}}>
          <div style={{fontSize:'4rem',marginBottom:'8px'}}>💀</div>
          <div style={{color:'#ef4444',fontSize:'1.6rem',fontWeight:900,letterSpacing:'0.1em',marginBottom:'4px'}}>GAME OVER</div>
          <div style={{color:'#94a3b8',marginBottom:'4px'}}>{pl?.name}はたおれてしまった…</div>
          <div style={{color:'#475569',fontSize:'0.78rem',marginBottom:'16px'}}>最終Lv.{pl?.level} / {STAGES[pl?.stage||0].name}</div>
          <button style={btnStyle('#ef4444')} onClick={restart}>🔄 もういちど</button>
        </div>
      )}

      {/* ===== CLEAR ===== */}
      {scr==='clear'&&(
        <div className="card" style={{textAlign:'center',animation:'popIn 0.5s ease',borderColor:'rgba(255,215,0,0.4)'}}>
          <div style={{fontSize:'4rem',marginBottom:'8px',animation:'winSpin 0.8s ease-in-out infinite'}}>🏆</div>
          <div style={{color:'#ffd700',fontSize:'1.4rem',fontWeight:900,marginBottom:'6px'}}>🎉 ゲームクリア！ 🎉</div>
          <div style={{color:'#a3e635',marginBottom:'4px'}}>{pl?.name}が 魔天王ゼロスを倒した！</div>
          <div style={{color:'#94a3b8',fontSize:'0.8rem',marginBottom:'4px'}}>世界に平和が戻った！</div>
          <div style={{color:'#475569',fontSize:'0.75rem',marginBottom:'16px'}}>最終Lv.{pl?.level} / EXP:{pl?.exp} / Gold:{pl?.gold}</div>
          <button style={btnStyle('#ffd700')} onClick={restart}>🔄 もういちど</button>
        </div>
      )}

      {/* ===== LOG ===== */}
      {scr!=='title'&&scr!=='select'&&(
        <div className="card" style={{maxHeight:'140px',overflowY:'auto',borderColor:'rgba(255,255,255,0.06)'}}>
          {log.map((e,i)=>(
            <div key={i} style={{padding:'3px 0',fontSize:'0.78rem',lineHeight:1.5,borderBottom:'1px solid rgba(255,255,255,0.04)',opacity:1-i*0.08,color:i===0?'#e2e8f0':'#64748b'}}>{e}</div>
          ))}
        </div>
      )}

      {/* iOS hint */}
      <div id="iosHint" style={{display:'none',position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(135deg,#1e1b4b,#312e81)',borderTop:'1px solid #ffd70055',padding:'12px',zIndex:9999,alignItems:'center',gap:'10px'}}>
        <div style={{flex:1,fontSize:'0.8rem',color:'#e2e8f0'}}>📱 Safari → 共有(□↑) →「ホーム画面に追加」でアプリになるよ！</div>
        <button onClick={()=>document.getElementById('iosHint').style.display='none'} style={{background:'transparent',border:'none',color:'#94a3b8',fontSize:'1.2rem',cursor:'pointer'}}>✕</button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isSA=window.matchMedia('(display-mode: standalone)').matches||navigator.standalone;
if(isIOS&&!isSA)setTimeout(()=>{const b=document.getElementById('iosHint');if(b)b.style.display='flex';},5000);
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
